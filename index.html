<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بغداد لايف</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 48px; margin-bottom: 20px; background: linear-gradient(135deg, #CE1126, #007A3D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status { color: #4caf50; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇮🇶 بغداد لايف</h1>
        <p>منصة تواصل اجتماعي عراقية</p>
        <div class="status">✅ السيرفر يعمل بشكل صحيح</div>
    </div>
</body>
</html>
