<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>صديق عشوائي | تعارف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://i.ibb.co/ymNqjks9/ec86b3a3baac247dab33322fcbc60384.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }

        /* الحاوية الرئيسية */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .header h1 {
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .online-badge {
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            margin-top: 8px;
            color: white;
        }

        /* حالة البحث */
        .status-area {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .status-text {
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .search-btn {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-btn:active {
            transform: scale(0.96);
        }

        .skip-btn {
            background: rgba(100,100,100,0.8);
            border: none;
            color: white;
            font-size: 16px;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* منطقة الدردشة */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            display: none;
        }

        .partner-info {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .partner-name {
            color: #ffaaaa;
            font-size: 16px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 80%;
        }

        .message.own {
            align-items: flex-end;
            align-self: flex-end;
        }

        .message-bubble {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 18px;
            color: white;
            font-size: 15px;
        }

        .message.own .message-bubble {
            background: linear-gradient(135deg, #CE1126, #007A3D);
        }

        .message-time {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        .input-area {
            padding: 12px 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 16px;
            outline: none;
        }

        .input-area input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* شاشة تسجيل الدخول */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .welcome-card {
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            padding: 35px 25px;
            text-align: center;
            max-width: 330px;
            width: 85%;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .welcome-card h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .welcome-card h1 span {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
        }

        .welcome-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .flag-decoration {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        .saved-info {
            margin-top: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .saved-info button {
            background: transparent;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app-container" style="display: none;">
        <div class="header">
            <h1>💬 صديق عشوائي 🇮🇶</h1>
            <div class="online-badge">🟢 <span id="online-count">0</span> متصل</div>
        </div>

        <div class="status-area" id="status-area">
            <div class="status-text" id="status-text">🔍 اضغط بحث للعثور على صديق</div>
            <button class="search-btn" id="search-btn">🔍 بحث عن صديق</button>
            <button class="skip-btn" id="skip-btn" style="display: none;">⏭️ تخطي</button>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="partner-info">
                تتحدث مع: <span class="partner-name" id="partner-name">...</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div style="text-align:center;color:rgba(255,255,255,0.6);">✨ ابدأ المحادثة...</div>
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="اكتب رسالة..." maxlength="500">
                <button id="send-btn">إرسال</button>
            </div>
        </div>
    </div>

    <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-card">
            <div class="flag-decoration">🇮🇶</div>
            <h1>صديق <span>عشوائي</span></h1>
            <p>تعرف على أشخاص جدد من كل العراق</p>
            <input type="text" id="login-username" placeholder="يوزر نيم (مثال: ahmed)" maxlength="20">
            <input type="text" id="login-displayname" placeholder="الاسم الظاهر" maxlength="20">
            <button id="login-btn">دخول</button>
            <div class="error-msg" id="error-msg"></div>
            <div class="saved-info" id="saved-info" style="display: none;">
                <div id="saved-text"></div>
                <button id="use-saved-btn">استخدم الحساب المحفوظ</button>
                <button id="logout-saved-btn">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let currentPartner = null;
        let isInChat = false;
        
        // العناصر
        const welcomeScreen = document.getElementById('welcome-screen');
        const appContainer = document.getElementById('app-container');
        const loginUsername = document.getElementById('login-username');
        const loginDisplayname = document.getElementById('login-displayname');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');
        const savedInfo = document.getElementById('saved-info');
        const savedText = document.getElementById('saved-text');
        const useSavedBtn = document.getElementById('use-saved-btn');
        const logoutSavedBtn = document.getElementById('logout-saved-btn');
        
        const searchBtn = document.getElementById('search-btn');
        const skipBtn = document.getElementById('skip-btn');
        const statusText = document.getElementById('status-text');
        const chatArea = document.getElementById('chat-area');
        const statusArea = document.getElementById('status-area');
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const partnerNameSpan = document.getElementById('partner-name');
        const onlineCountSpan = document.getElementById('online-count');
        
        function saveUser(username, displayName) {
            localStorage.setItem('match_user', JSON.stringify({ username, displayName }));
        }
        
        function loadSavedUser() {
            const saved = localStorage.getItem('match_user');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (user.username && user.displayName) {
                        savedText.innerHTML = `👤 ${user.displayName} (@${user.username})`;
                        savedInfo.style.display = 'block';
                        return user;
                    }
                } catch(e) {}
            }
            return null;
        }
        
        function logoutUser() {
            localStorage.removeItem('match_user');
            savedInfo.style.display = 'none';
        }
        
        function addMessage(text, isOwn = false, time = null) {
            const div = document.createElement('div');
            div.className = 'message' + (isOwn ? ' own' : '');
            div.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
                <div class="message-time">${time || new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.color = 'rgba(255,255,255,0.6)';
            div.style.fontSize = '12px';
            div.style.padding = '8px';
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startSearch() {
            if (isInChat) {
                endCurrentChat();
            }
            statusText.textContent = '⏳ جاري البحث عن صديق...';
            searchBtn.disabled = true;
            searchBtn.style.opacity = '0.5';
            skipBtn.style.display = 'none';
            socket.emit('find-partner');
        }
        
        function endCurrentChat() {
            if (currentPartner) {
                socket.emit('end-chat');
                currentPartner = null;
            }
            isInChat = false;
            chatArea.style.display = 'none';
            statusArea.style.display = 'block';
            chatMessages.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.6);">✨ ابدأ المحادثة...</div>';
            searchBtn.disabled = false;
            searchBtn.style.opacity = '1';
            skipBtn.style.display = 'none';
            statusText.textContent = '🔍 اضغط بحث للعثور على صديق';
        }
        
        function skipPartner() {
            if (isInChat) {
                socket.emit('skip-partner');
                statusText.textContent = '⏳ جاري البحث عن صديق جديد...';
                searchBtn.disabled = true;
                skipBtn.style.display = 'none';
                chatArea.style.display = 'none';
                statusArea.style.display = 'block';
                chatMessages.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.6);">✨ جاري البحث...</div>';
                isInChat = false;
                currentPartner = null;
            }
        }
        
        function startChat(partnerId, partnerName, partnerUsername) {
            currentPartner = { id: partnerId, name: partnerName, username: partnerUsername };
            isInChat = true;
            partnerNameSpan.textContent = partnerName;
            chatArea.style.display = 'flex';
            statusArea.style.display = 'none';
            searchBtn.disabled = false;
            searchBtn.style.opacity = '1';
            skipBtn.style.display = 'block';
            chatMessages.innerHTML = '';
            addSystemMessage(`✨ بدأت الدردشة مع ${partnerName}`);
            messageInput.focus();
        }
        
        // تسجيل الدخول
        loginBtn.onclick = function() {
            const username = loginUsername.value.trim().toLowerCase();
            const displayName = loginDisplayname.value.trim();
            errorMsg.style.display = 'none';
            
            if (!username) {
                errorMsg.textContent = 'الرجاء إدخال يوزر نيم';
                errorMsg.style.display = 'block';
                return;
            }
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                errorMsg.textContent = 'يوزر نيم: حروف وأرقام فقط (3-20)';
                errorMsg.style.display = 'block';
                return;
            }
            if (!displayName) {
                errorMsg.textContent = 'الرجاء إدخال الاسم الظاهر';
                errorMsg.style.display = 'block';
                return;
            }
            
            currentUser = { username, displayName };
            saveUser(username, displayName);
            socket.emit('set-user', { username, displayName });
        };
        
        useSavedBtn.onclick = function() {
            const saved = loadSavedUser();
            if (saved) {
                loginUsername.value = saved.username;
                loginDisplayname.value = saved.displayName;
                loginBtn.click();
            }
        };
        
        logoutSavedBtn.onclick = function() {
            logoutUser();
        };
        
        // أزرار الدردشة
        searchBtn.onclick = startSearch;
        skipBtn.onclick = skipPartner;
        
        sendBtn.onclick = function() {
            const msg = messageInput.value.trim();
            if (msg && isInChat && currentPartner) {
                socket.emit('send-message', { message: msg });
                addMessage(msg, true);
                messageInput.value = '';
                messageInput.focus();
            }
        };
        
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendBtn.click();
        };
        
        // أحداث السيرفر
        socket.on('user-set', function() {
            welcomeScreen.style.display = 'none';
            appContainer.style.display = 'flex';
            statusText.textContent = '🔍 اضغط بحث للعثور على صديق';
        });
        
        socket.on('online-count', function(count) {
            onlineCountSpan.textContent = count;
        });
        
        socket.on('waiting', function(data) {
            statusText.textContent = `⏳ في قائمة الانتظار... رقم ${data.position}`;
        });
        
        socket.on('matched', function(data) {
            startChat(data.partnerId, data.partnerName, data.partnerUsername);
        });
        
        socket.on('receive-message', function(data) {
            addMessage(data.message, false, data.time);
        });
        
        socket.on('partner-skipped', function() {
            addSystemMessage('⚠️ الطرف الآخر تخطى المحادثة');
            setTimeout(() => startSearch(), 1000);
        });
        
        socket.on('partner-disconnected', function() {
            addSystemMessage('⚠️ الطرف الآخر غادر');
            setTimeout(() => startSearch(), 1500);
        });
        
        socket.on('partner-ended', function() {
            addSystemMessage('⚠️ الطرف الآخر أنهى الدردشة');
            setTimeout(() => startSearch(), 1000);
        });
        
        socket.on('searching', function() {
            statusText.textContent = '🔍 جاري البحث...';
            searchBtn.disabled = false;
        });
        
        socket.on('username-taken', function() {
            errorMsg.textContent = 'هذا اليوزر نيم مستخدم من قبل!';
            errorMsg.style.display = 'block';
        });
        
        // تحميل المستخدم المحفوظ
        const savedUser = loadSavedUser();
        if (savedUser) {
            loginUsername.value = savedUser.username;
            loginDisplayname.value = savedUser.displayName;
        }
    </script>
</body>
    </html>
