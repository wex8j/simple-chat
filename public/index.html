<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة بسيطة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }
        .chat-header h3 {
            margin-bottom: 5px;
        }
        .online-users {
            font-size: 13px;
            opacity: 0.9;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message .username {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .message .text {
            background: white;
            padding: 10px 15px;
            border-radius: 18px;
            display: inline-block;
            max-width: 80%;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message .time {
            font-size: 10px;
            color: #999;
            margin-top: 3px;
        }
        .system-message {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 10px 0;
            font-style: italic;
        }
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .input-area input:focus {
            border-color: #667eea;
        }
        .input-area button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .input-area button:hover {
            transform: scale(1.02);
        }
        .input-area button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h3>💬 الدردشة العامة</h3>
            <div class="online-users">🟢 المتصلون: <span id="users-count">0</span></div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="system-message">✨ أهلاً بك! ادخل اسمك وابدأ المحادثة</div>
        </div>
        <div class="input-area" id="username-area">
            <input type="text" id="username" placeholder="✏️ أدخل اسمك هنا..." maxlength="20">
            <button id="join-btn">✅ دخول</button>
        </div>
        <div class="input-area" id="chat-area" style="display:none">
            <input type="text" id="message" placeholder="اكتب رسالتك..." maxlength="200">
            <button id="send-btn">📤 إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // الاتصال بالسيرفر
        const socket = io();

        // المتغيرات
        let username = '';

        // العناصر
        const joinBtn = document.getElementById('join-btn');
        const usernameInput = document.getElementById('username');
        const usernameArea = document.getElementById('username-area');
        const chatArea = document.getElementById('chat-area');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const usersCountSpan = document.getElementById('users-count');

        // دالة إضافة رسالة
        function addMessage(data, isSystem = false) {
            const div = document.createElement('div');
            if (isSystem) {
                div.className = 'system-message';
                div.textContent = data;
            } else {
                div.className = 'message';
                div.innerHTML = `
                    <div class="username">${escapeHtml(data.username)}</div>
                    <div class="text">${escapeHtml(data.message)}</div>
                    <div class="time">${data.time}</div>
                `;
            }
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // دالة حماية من أكواد خبيثة
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // زر الدخول
        joinBtn.onclick = function() {
            const name = usernameInput.value.trim();
            if (name !== '') {
                username = name;
                socket.emit('set-username', username);
                usernameArea.style.display = 'none';
                chatArea.style.display = 'flex';
                addMessage('✨ أهلاً بك ' + username, true);
                messageInput.focus();
            } else {
                alert('الرجاء إدخال اسمك');
            }
        };

        // زر الإرسال
        sendBtn.onclick = function() {
            const msg = messageInput.value.trim();
            if (msg !== '') {
                socket.emit('send-message', { message: msg });
                messageInput.value = '';
                messageInput.focus();
            }
        };

        // إرسال بالضغط على Enter
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        };

        usernameInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                joinBtn.click();
            }
        };

        // استقبال رسائل من السيرفر
        socket.on('receive-message', function(data) {
            addMessage(data);
        });

        socket.on('user-joined', function(msg) {
            addMessage(msg, true);
        });

        socket.on('user-left', function(msg) {
            addMessage(msg, true);
        });

        socket.on('users-list', function(users) {
            usersCountSpan.textContent = users.length;
        });
    </script>
</body>
</html>
