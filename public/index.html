<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>دردشة بغداد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* شاشة الدخول - بنفسجي نيون */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a0033, #0a001a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 0, 60, 0.8);
            backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 35px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1px solid rgba(156, 39, 176, 0.5);
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.3);
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card .welcome-text {
            color: #b39ddb;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        .login-card .community-text {
            color: #9c27b0;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: bold;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(50, 0, 80, 0.6);
            border: 1px solid #9c27b0;
            border-radius: 40px;
            color: white;
            text-align: center;
            font-size: 16px;
        }

        .login-card input::placeholder {
            color: #9c27b0;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(156, 39, 176, 0.5);
        }

        .error {
            color: #ff6b6b;
            margin-top: 12px;
            font-size: 13px;
        }

        /* التطبيق الرئيسي */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #000;
        }

        /* الهيدر */
        .header {
            padding: 12px 15px;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-bottom: 1px solid #9c27b0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }

        .user-name {
            font-size: 14px;
            font-weight: bold;
        }

        .user-username {
            font-size: 10px;
            color: #b39ddb;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .active-users-btn {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
            padding: 6px 10px;
            border-radius: 30px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* الصفحات */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page.active {
            display: block;
        }

        /* شعار الإشعارات مع الرقم */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #9c27b0;
        }

        .page-header h3 {
            font-size: 18px;
            color: #9c27b0;
        }

        .page-notification {
            position: relative;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            font-size: 10px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            display: none;
        }

        .notification-badge.show {
            display: flex;
        }

        /* المنشورات */
        .new-post {
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #9c27b0;
        }

        .new-post textarea {
            width: 100%;
            background: rgba(50, 0, 80, 0.6);
            border: 1px solid #9c27b0;
            border-radius: 20px;
            padding: 12px;
            color: white;
            resize: none;
            font-size: 15px;
            font-family: inherit;
        }

        .post-btn {
            margin-top: 10px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .post-card {
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #9c27b0;
        }

        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .post-info {
            flex: 1;
        }

        .post-name {
            font-weight: bold;
            font-size: 15px;
        }

        .post-username {
            font-size: 11px;
            color: #b39ddb;
        }

        .post-time {
            font-size: 10px;
            color: #9c27b0;
        }

        .post-text {
            margin: 12px 0;
            line-height: 1.5;
            font-size: 14px;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #9c27b0;
        }

        .like-btn, .delete-btn {
            background: none;
            border: none;
            color: #b39ddb;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* الدردشات والطلبات */
        .chat-item, .request-item {
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid #9c27b0;
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .accept, .reject {
            padding: 6px 14px;
            border-radius: 30px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .accept { background: #4caf50; }
        .reject { background: #f44336; }

        .empty {
            text-align: center;
            color: #b39ddb;
            padding: 40px;
            font-size: 14px;
        }

        /* نافذة الدردشة */
        .chat-window {
            display: none;
            flex-direction: column;
            height: 100%;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
        }

        .chat-header {
            padding: 12px 15px;
            background: linear-gradient(135deg, #2a004a, #1a0033);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #9c27b0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back {
            background: none;
            border: none;
            color: #9c27b0;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-with-name {
            font-size: 16px;
            font-weight: bold;
        }

        .exit-chat-btn {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            border: none;
            padding: 6px 15px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }

        .msg.own {
            align-self: flex-end;
            align-items: flex-end;
        }

        .bubble {
            background: rgba(156, 39, 176, 0.3);
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 14px;
            border: 1px solid #9c27b0;
        }

        .msg.own .bubble {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
        }

        .msg-time {
            font-size: 9px;
            color: #9c27b0;
            margin-top: 3px;
        }

        .chat-input {
            padding: 12px;
            background: linear-gradient(135deg, #2a004a, #1a0033);
            display: flex;
            gap: 10px;
            border-top: 1px solid #9c27b0;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            background: rgba(50, 0, 80, 0.6);
            border: 1px solid #9c27b0;
            border-radius: 30px;
            color: white;
            font-size: 14px;
        }

        .chat-input button {
            padding: 10px 18px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        /* نافذة تعديل الملف الشخصي */
        .profile-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .profile-modal.active {
            display: flex;
        }

        .profile-card {
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 320px;
            border: 1px solid #9c27b0;
            text-align: center;
        }

        .profile-card h3 {
            margin-bottom: 20px;
            color: #9c27b0;
        }

        .profile-avatar-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        .profile-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(50, 0, 80, 0.6);
            border: 1px solid #9c27b0;
            border-radius: 30px;
            color: white;
            text-align: center;
        }

        .profile-card button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .close-modal {
            background: none;
            border: none;
            color: #9c27b0;
            font-size: 24px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* قائمة الأعضاء النشطين */
        .active-users-modal {
            display: none;
            position: fixed;
            top: 60px;
            right: 10px;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-radius: 20px;
            padding: 15px;
            width: 250px;
            border: 1px solid #9c27b0;
            z-index: 2000;
            max-height: 300px;
            overflow-y: auto;
        }

        .active-users-modal.active {
            display: block;
        }

        .active-users-modal h4 {
            margin-bottom: 10px;
            color: #9c27b0;
            text-align: center;
        }

        .active-user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        .active-user-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .active-user-name {
            font-size: 13px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        /* الشريط السفلي */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 15px 12px;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-top: 1px solid #9c27b0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            color: #b39ddb;
            font-size: 11px;
            cursor: pointer;
            padding: 6px 15px;
            border-radius: 30px;
        }

        .nav-item span:first-child {
            font-size: 20px;
        }

        .nav-item.active {
            color: #9c27b0;
            background: rgba(156, 39, 176, 0.2);
        }

        /* القائمة الجانبية */
        .users-sidebar {
            position: fixed;
            top: 0;
            left: -100%;
            width: 280px;
            height: 100vh;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            z-index: 2000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #9c27b0;
        }

        .users-sidebar.open {
            left: 0;
        }

        .users-header {
            padding: 20px;
            background: linear-gradient(135deg, #2a004a, #1a0033);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #9c27b0;
        }

        .close-users {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #9c27b0;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .user-item {
            background: rgba(50, 0, 80, 0.4);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #9c27b0;
        }

        .add-friend {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 10px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1999;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-card">
        <h1>🇮🇶 دردشة بغداد</h1>
        <div class="welcome-text">✨ هلاً بيكم ✨</div>
        <div class="community-text">مجتمع عراقي - سجل الآن وتواصل ويا الناس</div>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="displayname" placeholder="الاسم الظاهر (للتسجيل)">
        <button id="login-btn">دخول / تسجيل</button>
        <div class="error" id="error-msg"></div>
    </div>
</div>

<div class="app" id="app" style="display: none;">
    <div class="header">
        <div class="header-left">
            <div class="user-avatar" id="profile-avatar-btn">👤</div>
            <div>
                <div class="user-name" id="user-name">...</div>
                <div class="user-username" id="user-username">@...</div>
            </div>
        </div>
        <div class="header-right">
            <button class="active-users-btn" id="active-users-btn">
                <span>🟢</span> النشطين
            </button>
            <button class="menu-btn" id="menu-btn">👥</button>
        </div>
    </div>

    <div class="main-content" id="main-content">
        <!-- صفحة المنشورات -->
        <div class="page active" id="posts-page">
            <div class="page-header">
                <h3>📱 المنشورات</h3>
                <button class="page-notification" id="posts-notification">
                    🔔
                    <span class="notification-badge" id="posts-badge">0</span>
                </button>
            </div>
            <div class="new-post">
                <textarea id="post-text" placeholder="شارك ما في خاطرك..." rows="3"></textarea>
                <button class="post-btn" id="post-btn">نشر</button>
            </div>
            <div id="posts-list"></div>
        </div>

        <!-- صفحة الدردشات -->
        <div class="page" id="chats-page">
            <div class="page-header">
                <h3>💬 الدردشات</h3>
                <button class="page-notification" id="chats-notification">
                    🔔
                    <span class="notification-badge" id="chats-badge">0</span>
                </button>
            </div>
            <div id="chats-list"></div>
        </div>

        <!-- صفحة الطلبات -->
        <div class="page" id="requests-page">
            <div class="page-header">
                <h3>📩 الطلبات</h3>
                <button class="page-notification" id="requests-notification">
                    🔔
                    <span class="notification-badge" id="requests-badge">0</span>
                </button>
            </div>
            <div id="requests-list"></div>
        </div>
    </div>

    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <div class="chat-header-left">
                <button class="back" id="chat-back">←</button>
                <span class="chat-with-name" id="chat-with-name"></span>
            </div>
            <button class="exit-chat-btn" id="exit-chat-btn">✕ خروج</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            <button id="send-msg">إرسال</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" data-page="posts"><span>📱</span><span>الرئيسية</span></button>
        <button class="nav-item" data-page="chats"><span>💬</span><span>الدردشات</span></button>
        <button class="nav-item" data-page="requests"><span>📩</span><span>الطلبات</span></button>
    </div>
</div>

<!-- نافذة تعديل الملف الشخصي -->
<div class="profile-modal" id="profile-modal">
    <div class="profile-card">
        <h3>✏️ تعديل الملف الشخصي</h3>
        <div class="profile-avatar-large" id="profile-avatar-large">👤</div>
        <input type="text" id="edit-displayname" placeholder="الاسم الظاهر">
        <input type="text" id="edit-avatar" placeholder="رمز الصورة (😀, 😎, 🦁)">
        <button id="save-profile-btn">💾 حفظ التغييرات</button>
        <button class="close-modal" id="close-profile-modal">✕ إغلاق</button>
    </div>
</div>

<!-- قائمة الأعضاء النشطين -->
<div class="active-users-modal" id="active-users-modal">
    <h4>🟢 الأعضاء النشطون</h4>
    <div id="active-users-list"></div>
</div>

<!-- قائمة المستخدمين الجانبية -->
<div class="overlay" id="overlay"></div>
<div class="users-sidebar" id="users-sidebar">
    <div class="users-header">
        <h3>👥 المستخدمون</h3>
        <button class="close-users" id="close-users">✕</button>
    </div>
    <div class="users-list" id="users-list"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket, currentUser, currentChatWith;
let conversations = JSON.parse(localStorage.getItem('conv') || '{}');
let notificationCounts = { posts: 0, chats: 0, requests: 0 };

function escapeHtml(t) { let d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function updateNotificationBadge(page, count) {
    let badge = document.getElementById(`${page}-badge`);
    if (badge) {
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.add('show');
        } else {
            badge.classList.remove('show');
        }
    }
}

function addNotification(page) {
    notificationCounts[page]++;
    updateNotificationBadge(page, notificationCounts[page]);
}

function clearNotifications(page) {
    notificationCounts[page] = 0;
    updateNotificationBadge(page, 0);
}

function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`${page}-page`).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
    if (page === 'chats') loadChatsList();
    if (page === 'requests') loadRequestsList();
    clearNotifications(page);
}

function openUsersMenu() {
    document.getElementById('users-sidebar').classList.add('open');
    document.getElementById('overlay').classList.add('active');
}

function closeUsersMenu() {
    document.getElementById('users-sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

function openProfileModal() {
    document.getElementById('edit-displayname').value = currentUser.displayName;
    document.getElementById('edit-avatar').value = currentUser.avatar || '👤';
    document.getElementById('profile-avatar-large').textContent = currentUser.avatar || '👤';
    document.getElementById('profile-modal').classList.add('active');
}

function closeProfileModal() {
    document.getElementById('profile-modal').classList.remove('active');
}

function saveProfile() {
    let newName = document.getElementById('edit-displayname').value.trim();
    let newAvatar = document.getElementById('edit-avatar').value.trim() || '👤';
    if (newName) {
        currentUser.displayName = newName;
        currentUser.avatar = newAvatar;
        document.getElementById('user-name').textContent = newName;
        document.getElementById('profile-avatar-large').textContent = newAvatar;
        document.querySelector('.user-avatar').textContent = newAvatar;
        socket.emit('update-profile', { displayName: newName, avatar: newAvatar });
        closeProfileModal();
    }
}

function toggleActiveUsers() {
    let modal = document.getElementById('active-users-modal');
    modal.classList.toggle('active');
    setTimeout(() => modal.classList.remove('active'), 5000);
}

function updateActiveUsersList(users) {
    let container = document.getElementById('active-users-list');
    container.innerHTML = '';
    users.forEach(u => {
        if (u.username === currentUser.username) return;
        let div = document.createElement('div');
        div.className = 'active-user-item';
        div.innerHTML = `
            <div class="active-user-avatar">${u.avatar || '👤'}</div>
            <div class="active-user-name">${escapeHtml(u.displayName)} <span class="online-dot"></span></div>
        `;
        container.appendChild(div);
    });
    if (container.innerHTML === '') {
        container.innerHTML = '<div style="text-align:center;color:#888;">لا يوجد أعضاء نشطون</div>';
    }
}

function updateUsers(users) {
    let container = document.getElementById('users-list');
    container.innerHTML = '';
    users.forEach(u => {
        if (u.username === currentUser.username) return;
        let isFriend = currentUser.friends.includes(u.username);
        let hasRequest = currentUser.requests.includes(u.username);
        let div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
            <div>
                <div><strong>${escapeHtml(u.displayName)}</strong> ${isFriend ? '<span style="background:#4caf50;font-size:9px;padding:2px 6px;border-radius:20px;">صديق</span>' : ''} ${hasRequest ? '<span style="background:#ff9800;font-size:9px;padding:2px 6px;border-radius:20px;">طلب</span>' : ''}</div>
                <div style="font-size:10px;color:#888;">@${escapeHtml(u.username)}</div>
            </div>
            ${!isFriend && !hasRequest ? `<button class="add-friend" data-user="${u.username}">➕ إضافة</button>` : ''}
        `;
        let btn = div.querySelector('.add-friend');
        if (btn) btn.onclick = () => socket.emit('add-friend', u.username);
        container.appendChild(div);
    });
    updateActiveUsersList(users.filter(u => u.username !== currentUser.username));
}

function loadRequestsList() {
    let container = document.getElementById('requests-list');
    if (!currentUser.requests.length) { container.innerHTML = '<div class="empty">لا توجد طلبات</div>'; return; }
    container.innerHTML = '';
    currentUser.requests.forEach(req => {
        let div = document.createElement('div');
        div.className = 'request-item';
        div.innerHTML = `
            <div><strong>${escapeHtml(req)}</strong> يريد إضافتك كصديق</div>
            <div class="request-actions">
                <button class="accept" data-user="${req}">قبول</button>
                <button class="reject" data-user="${req}">رفض</button>
            </div>
        `;
        div.querySelector('.accept').onclick = () => socket.emit('accept-friend', req);
        div.querySelector('.reject').onclick = () => socket.emit('reject-friend', req);
        container.appendChild(div);
    });
}

function loadChatsList() {
    let container = document.getElementById('chats-list');
    let friends = currentUser.friends;
    if (!friends.length) { container.innerHTML = '<div class="empty">لا توجد محادثات</div>'; return; }
    container.innerHTML = '';
    friends.forEach(f => {
        let room = [currentUser.username, f].sort().join('-');
        let last = conversations[room]?.length ? conversations[room][conversations[room].length-1].message : '';
        let div = document.createElement('div');
        div.className = 'chat-item';
        div.innerHTML = `<div><strong>${escapeHtml(f)}</strong><div style="font-size:12px;color:#b39ddb;">${last ? last.substring(0,30) : 'ابدأ المحادثة'}</div></div>`;
        div.onclick = () => openChat(f);
        container.appendChild(div);
    });
}

function openChat(username) {
    if (!currentUser.friends.includes(username)) { alert('يجب أن تكون صديقاً أولاً'); return; }
    currentChatWith = username;
    document.getElementById('main-content').style.display = 'none';
    document.querySelector('.bottom-nav').style.display = 'none';
    document.getElementById('chat-window').style.display = 'flex';
    document.getElementById('chat-with-name').textContent = username;
    let msgsDiv = document.getElementById('chat-messages');
    msgsDiv.innerHTML = '';
    let room = [currentUser.username, username].sort().join('-');
    let msgs = conversations[room] || [];
    msgs.forEach(m => addMessage(m.message, m.from === currentUser.username, m.time));
}

function addMessage(msg, isOwn, time) {
    let div = document.createElement('div');
    div.className = 'msg ' + (isOwn ? 'own' : '');
    div.innerHTML = `<div class="bubble">${escapeHtml(msg)}</div><div class="msg-time">${time||''}</div>`;
    document.getElementById('chat-messages').appendChild(div);
    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

function sendMessage() {
    let input = document.getElementById('chat-input');
    let msg = input.value.trim();
    if (!msg || !currentChatWith) return;
    socket.emit('private-message', { to: currentChatWith, message: msg });
    let room = [currentUser.username, currentChatWith].sort().join('-');
    if (!conversations[room]) conversations[room] = [];
    conversations[room].push({ from: currentUser.username, message: msg, time: new Date().toLocaleTimeString() });
    localStorage.setItem('conv', JSON.stringify(conversations));
    addMessage(msg, true, new Date().toLocaleTimeString());
    input.value = '';
}

function addPost(post) {
    let container = document.getElementById('posts-list');
    let isOwn = post.username === currentUser.username;
    let div = document.createElement('div');
    div.className = 'post-card';
    div.dataset.id = post.id;
    div.innerHTML = `
        <div class="post-header">
            <div class="post-avatar">${post.avatar || '👤'}</div>
            <div class="post-info">
                <div class="post-name">${escapeHtml(post.displayName)}</div>
                <div class="post-username">@${escapeHtml(post.username)}</div>
            </div>
            <div class="post-time">${new Date(post.time).toLocaleTimeString()}</div>
        </div>
        <div class="post-text">${escapeHtml(post.text)}</div>
        <div class="post-actions">
            <button class="like-btn">❤️ ${post.likes||0}</button>
            ${isOwn ? '<button class="delete-btn">🗑️ حذف</button>' : ''}
        </div>
    `;
    div.querySelector('.like-btn').onclick = () => socket.emit('like-post', post.id);
    if (isOwn) div.querySelector('.delete-btn').onclick = () => socket.emit('delete-post', post.id);
    container.prepend(div);
}

function loadPosts(posts) {
    let container = document.getElementById('posts-list');
    container.innerHTML = '';
    [...posts].reverse().forEach(p => addPost(p));
}

function startApp(data) {
    currentUser = {
        username: data.username,
        displayName: data.displayName,
        avatar: data.avatar || '👤',
        friends: data.friends || [],
        requests: data.requests || []
    };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-name').textContent = data.displayName;
    document.getElementById('user-username').textContent = `@${data.username}`;
    document.querySelector('.user-avatar').textContent = currentUser.avatar;
    updateUsers(data.users);
    loadPosts(data.posts);
    switchPage('posts');
    
    socket.on('new-request', (d) => {
        currentUser.requests.push(d.from);
        updateUsers(data.users);
        if (document.getElementById('requests-page').classList.contains('active')) loadRequestsList();
        addNotification('requests');
    });
    socket.on('request-accepted', (d) => {
        if (!currentUser.friends.includes(d.from)) currentUser.friends.push(d.from);
        currentUser.requests = currentUser.requests.filter(u => u !== d.from);
        updateUsers(data.users);
        loadChatsList();
        loadRequestsList();
        addNotification('chats');
    });
    socket.on('new-message', (d) => {
        let room = [currentUser.username, d.from].sort().join('-');
        if (!conversations[room]) conversations[room] = [];
        conversations[room].push({ from: d.from, message: d.message, time: d.time });
        localStorage.setItem('conv', JSON.stringify(conversations));
        if (currentChatWith === d.from) addMessage(d.message, false, d.time);
        else loadChatsList();
        addNotification('chats');
    });
    socket.on('post-added', (p) => addPost(p));
    socket.on('post-updated', (p) => {
        let el = document.querySelector(`.post-card[data-id="${p.id}"]`);
        if (el) el.querySelector('.like-btn').innerHTML = `❤️ ${p.likes}`;
    });
    socket.on('post-deleted', (id) => document.querySelector(`.post-card[data-id="${id}"]`)?.remove());
    socket.on('profile-updated', (d) => {
        if (d.username === currentUser.username) {
            currentUser.displayName = d.displayName;
            currentUser.avatar = d.avatar;
            document.getElementById('user-name').textContent = d.displayName;
            document.querySelector('.user-avatar').textContent = d.avatar;
        }
    });
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('login-btn').onclick = () => {
        let user = document.getElementById('username').value.trim().toLowerCase();
        let pass = document.getElementById('password').value.trim();
        let name = document.getElementById('displayname').value.trim();
        let err = document.getElementById('error-msg');
        if (!user || !pass) { err.textContent = 'املأ الحقول'; return; }
        socket = io();
        socket.on('connect', () => socket.emit('login', { username: user, password: pass, displayName: name || user }));
        socket.on('login-success', startApp);
        socket.on('login-error', (m) => err.textContent = m);
    };
    
    document.getElementById('menu-btn').onclick = openUsersMenu;
    document.getElementById('close-users').onclick = closeUsersMenu;
    document.getElementById('overlay').onclick = closeUsersMenu;
    document.getElementById('profile-avatar-btn').onclick = openProfileModal;
    document.getElementById('close-profile-modal').onclick = closeProfileModal;
    document.getElementById('save-profile-btn').onclick = saveProfile;
    document.getElementById('active-users-btn').onclick = toggleActiveUsers;
    
    document.getElementById('posts-notification').onclick = () => {
        clearNotifications('posts');
    };
    document.getElementById('chats-notification').onclick = () => {
        clearNotifications('chats');
        switchPage('chats');
    };
    document.getElementById('requests-notification').onclick = () => {
        clearNotifications('requests');
        switchPage('requests');
    };
    
    document.getElementById('post-btn').onclick = () => {
        let t = document.getElementById('post-text').value.trim();
        if (t && socket) socket.emit('new-post', { text: t });
        document.getElementById('post-text').value = '';
    };
    
    document.getElementById('chat-back').onclick = () => {
        document.getElementById('chat-window').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.querySelector('.bottom-nav').style.display = 'flex';
        currentChatWith = null;
        loadChatsList();
        switchPage('chats');
    };
    
    document.getElementById('exit-chat-btn').onclick = () => {
        document.getElementById('chat-window').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.querySelector('.bottom-nav').style.display = 'flex';
        currentChatWith = null;
        loadChatsList();
        switchPage('chats');
    };
    
    document.getElementById('send-msg').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    document.querySelectorAll('.nav-item').forEach(el => el.onclick = () => switchPage(el.dataset.page));
    
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#active-users-btn') && !e.target.closest('#active-users-modal')) {
            document.getElementById('active-users-modal').classList.remove('active');
        }
    });
});
</script>
