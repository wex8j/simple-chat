<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بغداد لايف | تواصل اجتماعي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
        }
        /* شاشة تسجيل الدخول */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 300px;
        }
        .login-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2a2a3a;
            border: none;
            border-radius: 20px;
            color: white;
            text-align: center;
        }
        .login-card button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .error-msg { color: #ff6b6b; margin-top: 10px; font-size: 12px; }
        
        /* التطبيق الرئيسي */
        .app {
            display: flex;
            min-height: 100vh;
        }
        /* القائمة الجانبية */
        .sidebar {
            width: 250px;
            background: #0f0f1a;
            padding: 20px;
            position: fixed;
            right: 0;
            height: 100vh;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .logo { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .nav-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: none;
            border: none;
            color: white;
            text-align: right;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
        }
        .nav-btn.active, .nav-btn:hover { background: linear-gradient(135deg, #CE1126, #007A3D); }
        .user-info {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar { width: 40px; height: 40px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-details { flex: 1; }
        .user-name { font-weight: bold; }
        .user-username { font-size: 11px; color: #888; }
        .logout-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
        
        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            margin-right: 250px;
            margin-left: 250px;
            padding: 20px;
        }
        /* قائمة المستخدمين */
        .users-sidebar {
            width: 250px;
            background: #0f0f1a;
            padding: 20px;
            position: fixed;
            left: 0;
            height: 100vh;
            border-right: 1px solid #333;
            overflow-y: auto;
        }
        .users-sidebar h3 { margin-bottom: 15px; font-size: 16px; }
        .user-card {
            background: #1e1e2e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .friend-status { font-size: 11px; color: #4caf50; }
        .request-btn, .accept-btn, .reject-btn {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }
        .accept-btn { background: #4caf50; }
        .reject-btn { background: #f44336; }
        
        /* المنشورات */
        .create-post {
            background: #1e1e2e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .create-post textarea {
            width: 100%;
            background: #2a2a3a;
            border: none;
            border-radius: 10px;
            padding: 10px;
            color: white;
            resize: none;
        }
        .post-btn {
            margin-top: 10px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .post-card {
            background: #1e1e2e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .post-text { margin-bottom: 10px; }
        .like-btn { background: none; border: none; color: #888; cursor: pointer; }
        
        /* الدردشة */
        .chat-area {
            display: none;
            flex-direction: column;
            height: calc(100vh - 100px);
            background: #1e1e2e;
            border-radius: 15px;
        }
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .message { margin-bottom: 10px; }
        .message.own { text-align: left; }
        .bubble {
            display: inline-block;
            background: #2a2a3a;
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
        }
        .message.own .bubble { background: linear-gradient(135deg, #CE1126, #007A3D); }
        .chat-input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid #333;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            background: #2a2a3a;
            border: none;
            border-radius: 20px;
            color: white;
        }
        .chat-input-area button {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .conversations-list { padding: 15px; }
        .conversation-item {
            background: #2a2a3a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .system-message { text-align: center; color: #888; font-size: 12px; margin: 10px 0; }
        .empty-state { text-align: center; color: #888; padding: 20px; }
        .friend-badge { font-size: 10px; background: #4caf50; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
        
        @media (max-width: 800px) {
            .sidebar, .users-sidebar { display: none; }
            .main-content { margin: 0; }
        }
    </style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
    <div class="login-card">
        <h2>🇮🇶 بغداد لايف</h2>
        <p>سجل دخولك</p>
        <input type="text" id="login-username" placeholder="يوزر نيم" maxlength="20">
        <input type="password" id="login-password" placeholder="كلمة السر" maxlength="20">
        <button id="login-btn">دخول</button>
        <div class="error-msg" id="error-msg"></div>
    </div>
</div>

<div class="app" id="app" style="display: none;">
    <div class="sidebar">
        <div class="logo"><h2>🇮🇶 بغداد لايف</h2></div>
        <button class="nav-btn active" data-page="home">🏠 الرئيسية</button>
        <button class="nav-btn" data-page="chat">💬 المحادثات</button>
        <div class="user-info">
            <div class="user-avatar">👤</div>
            <div class="user-details">
                <div class="user-name" id="user-name">...</div>
                <div class="user-username" id="user-username">@...</div>
            </div>
            <button class="logout-btn" id="logout-btn">🚪</button>
        </div>
    </div>

    <div class="main-content">
        <div id="home-page">
            <div class="create-post">
                <textarea id="post-text" placeholder="شارك شي مع الجميع..." rows="3"></textarea>
                <button class="post-btn" id="post-btn">نشر</button>
            </div>
            <div id="posts-feed"></div>
        </div>
        <div id="chat-page" style="display: none;">
            <div id="conversations-list"></div>
            <div class="chat-area" id="chat-area">
                <div class="chat-header">
                    <button class="back-btn" id="back-btn">←</button>
                    <span id="chat-partner-name"></span>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="اكتب رسالة...">
                    <button id="send-chat-btn">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <div class="users-sidebar">
        <h3>👥 المستخدمون</h3>
        <div id="users-list"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket;
    let currentUser = null;
    let currentChatWith = null;
    let usersData = {}; // تخزين بيانات المستخدمين
    let friends = []; // قائمة الأصدقاء
    let pendingRequests = []; // طلبات معلقة
    let posts = [];
    let conversations = JSON.parse(localStorage.getItem('conversations_' + (currentUser?.username || '')) || '{}');
    
    // دوال مساعدة
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function saveAccounts() {
        const accounts = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('account_')) {
                const username = key.replace('account_', '');
                accounts[username] = JSON.parse(localStorage.getItem(key));
            }
        }
        localStorage.setItem('all_accounts', JSON.stringify(accounts));
    }
    
    function loadAccounts() {
        const saved = localStorage.getItem('all_accounts');
        if (saved) {
            const accounts = JSON.parse(saved);
            for (let [username, data] of Object.entries(accounts)) {
                localStorage.setItem(`account_${username}`, JSON.stringify(data));
                usersData[username] = data;
            }
        }
    }
    
    function registerUser(username, password, displayName) {
        if (localStorage.getItem(`account_${username}`)) {
            return false;
        }
        const userData = { username, password, displayName, friends: [], pendingRequests: [] };
        localStorage.setItem(`account_${username}`, JSON.stringify(userData));
        usersData[username] = userData;
        saveAccounts();
        return true;
    }
    
    function loginUser(username, password) {
        const userData = localStorage.getItem(`account_${username}`);
        if (!userData) return null;
        const data = JSON.parse(userData);
        if (data.password !== password) return null;
        return data;
    }
    
    function updateFriendsList() {
        if (!currentUser) return;
        const userData = usersData[currentUser.username];
        friends = userData?.friends || [];
        pendingRequests = userData?.pendingRequests || [];
        
        // تحديث الواجهة
        const container = document.getElementById('users-list');
        if (!container) return;
        
        const allUsers = Object.keys(usersData).filter(u => u !== currentUser.username);
        container.innerHTML = '';
        
        allUsers.forEach(u => {
            const isFriend = friends.includes(u);
            const hasPending = pendingRequests.includes(u);
            const user = usersData[u];
            
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `
                <div>
                    <strong>${escapeHtml(user.displayName)}</strong><br>
                    <small>@${escapeHtml(u)}</small>
                    ${isFriend ? '<span class="friend-badge">صديق</span>' : ''}
                </div>
                <div>
                    ${!isFriend && !hasPending ? `<button class="request-btn" data-user="${u}">➕ طلب</button>` : ''}
                    ${hasPending ? `<button class="accept-btn" data-user="${u}">✅ قبول</button><button class="reject-btn" data-user="${u}">❌ رفض</button>` : ''}
                    ${isFriend ? `<button class="request-btn" data-user="${u}" style="background:#4caf50;">💬 دردشة</button>` : ''}
                </div>
            `;
            
            const btns = div.querySelectorAll('button');
            btns.forEach(btn => {
                btn.onclick = () => {
                    if (btn.classList.contains('request-btn') && btn.textContent.includes('طلب')) {
                        sendFriendRequest(u);
                    } else if (btn.classList.contains('accept-btn')) {
                        acceptFriendRequest(u);
                    } else if (btn.classList.contains('reject-btn')) {
                        rejectFriendRequest(u);
                    } else if (btn.textContent.includes('دردشة')) {
                        openChat(u);
                    }
                };
            });
            container.appendChild(div);
        });
    }
    
    function sendFriendRequest(toUser) {
        const userData = usersData[toUser];
        if (userData) {
            if (!userData.pendingRequests) userData.pendingRequests = [];
            if (!userData.pendingRequests.includes(currentUser.username)) {
                userData.pendingRequests.push(currentUser.username);
                localStorage.setItem(`account_${toUser}`, JSON.stringify(userData));
                saveAccounts();
                addSystemMessage(`✅ تم إرسال طلب صداقة إلى ${toUser}`, 'chat-messages');
                updateFriendsList();
                // إشعار للمستخدم الآخر
                if (socket) socket.emit('friend-request', { from: currentUser.username, to: toUser });
            }
        }
    }
    
    function acceptFriendRequest(fromUser) {
        const userData = usersData[currentUser.username];
        userData.pendingRequests = userData.pendingRequests.filter(u => u !== fromUser);
        if (!userData.friends) userData.friends = [];
        if (!userData.friends.includes(fromUser)) userData.friends.push(fromUser);
        localStorage.setItem(`account_${currentUser.username}`, JSON.stringify(userData));
        
        const fromData = usersData[fromUser];
        if (fromData) {
            if (!fromData.friends) fromData.friends = [];
            if (!fromData.friends.includes(currentUser.username)) fromData.friends.push(currentUser.username);
            localStorage.setItem(`account_${fromUser}`, JSON.stringify(fromData));
        }
        saveAccounts();
        updateFriendsList();
        addSystemMessage(`🎉 أصبحت صديقًا مع ${fromUser}`, 'chat-messages');
        if (socket) socket.emit('friend-accepted', { from: currentUser.username, to: fromUser });
    }
    
    function rejectFriendRequest(fromUser) {
        const userData = usersData[currentUser.username];
        userData.pendingRequests = userData.pendingRequests.filter(u => u !== fromUser);
        localStorage.setItem(`account_${currentUser.username}`, JSON.stringify(userData));
        saveAccounts();
        updateFriendsList();
        if (socket) socket.emit('friend-rejected', { from: currentUser.username, to: fromUser });
    }
    
    function addSystemMessage(text, containerId = 'chat-messages') {
        const container = document.getElementById(containerId);
        if (container) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    }
    
    function addMessageToChat(message, isOwn, time) {
        const container = document.getElementById('chat-messages');
        if (!container) return;
        const div = document.createElement('div');
        div.className = 'message ' + (isOwn ? 'own' : '');
        div.innerHTML = `<div class="bubble">${escapeHtml(message)}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    function openChat(username) {
        if (!friends.includes(username)) {
            addSystemMessage('❌ يجب أن تكون صديقًا أولاً للدردشة', 'chat-messages');
            return;
        }
        currentChatWith = username;
        document.getElementById('conversations-list').style.display = 'none';
        document.getElementById('chat-area').style.display = 'flex';
        document.getElementById('chat-partner-name').textContent = username;
        document.getElementById('chat-messages').innerHTML = '';
        
        const roomId = [currentUser.username, username].sort().join('-');
        const messages = conversations[roomId] || [];
        messages.forEach(msg => {
            addMessageToChat(msg.message, msg.from === currentUser.username, msg.time);
        });
    }
    
    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const msg = input.value.trim();
        if (!msg || !currentChatWith || !socket) return;
        
        const roomId = [currentUser.username, currentChatWith].sort().join('-');
        socket.emit('send-chat-message', { roomId, message: msg });
        
        if (!conversations[roomId]) conversations[roomId] = [];
        conversations[roomId].push({
            from: currentUser.username,
            message: msg,
            time: new Date().toLocaleTimeString()
        });
        localStorage.setItem(`conversations_${currentUser.username}`, JSON.stringify(conversations));
        addMessageToChat(msg, true);
        input.value = '';
    }
    
    function loadConversationsList() {
        const container = document.getElementById('conversations-list');
        const roomIds = Object.keys(conversations);
        if (roomIds.length === 0) {
            container.innerHTML = '<div class="empty-state">لا توجد محادثات بعد</div>';
            return;
        }
        container.innerHTML = '';
        roomIds.forEach(roomId => {
            const otherUser = roomId.split('-').find(u => u !== currentUser.username);
            const div = document.createElement('div');
            div.className = 'conversation-item';
            div.innerHTML = `<div><strong>${escapeHtml(otherUser)}</strong></div>`;
            div.onclick = () => openChat(otherUser);
            container.appendChild(div);
        });
    }
    
    function addPostToFeed(post) {
        const container = document.getElementById('posts-feed');
        const isOwn = post.username === currentUser?.username;
        const div = document.createElement('div');
        div.className = 'post-card';
        div.dataset.id = post.id;
        div.innerHTML = `
            <div class="post-header">
                <div><strong>${escapeHtml(post.displayName)}</strong> @${escapeHtml(post.username)}</div>
                <div>${new Date(post.time).toLocaleTimeString()}</div>
            </div>
            <div class="post-text">${escapeHtml(post.text)}</div>
            <button class="like-btn">❤️ ${post.likes || 0}</button>
            ${isOwn ? '<button class="delete-btn" style="background:none;border:none;color:red;margin-left:10px;">🗑️</button>' : ''}
        `;
        div.querySelector('.like-btn').onclick = () => { post.likes++; addPostToFeed(post); };
        if (isOwn) {
            div.querySelector('.delete-btn').onclick = () => {
                posts = posts.filter(p => p.id !== post.id);
                loadPosts();
            };
        }
        container.prepend(div);
    }
    
    function loadPosts() {
        const container = document.getElementById('posts-feed');
        container.innerHTML = '';
        [...posts].reverse().forEach(post => addPostToFeed(post));
    }
    
    function switchPage(page) {
        document.getElementById('home-page').style.display = page === 'home' ? 'block' : 'none';
        document.getElementById('chat-page').style.display = page === 'chat' ? 'block' : 'none';
        if (page === 'chat') loadConversationsList();
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.nav-btn[data-page="${page}"]`).classList.add('active');
    }
    
    function startApp(userData) {
        currentUser = { username: userData.username, displayName: userData.displayName };
        friends = userData.friends || [];
        pendingRequests = userData.pendingRequests || [];
        conversations = JSON.parse(localStorage.getItem(`conversations_${currentUser.username}`) || '{}');
        
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('user-name').textContent = userData.displayName;
        document.getElementById('user-username').textContent = `@${userData.username}`;
        
        updateFriendsList();
        loadPosts();
        switchPage('home');
        
        socket = io();
        socket.on('connect', () => {
            socket.emit('user-online', { username: currentUser.username });
        });
        socket.on('friend-request', (data) => {
            if (data.to === currentUser.username) {
                updateFriendsList();
                addSystemMessage(`📩 طلب صداقة جديد من ${data.from}`, 'chat-messages');
            }
        });
        socket.on('friend-accepted', (data) => {
            if (data.to === currentUser.username) {
                updateFriendsList();
                addSystemMessage(`🎉 ${data.from} قبل طلب الصداقة!`, 'chat-messages');
            }
        });
        socket.on('chat-message', (data) => {
            const roomId = [currentUser.username, data.from].sort().join('-');
            if (!conversations[roomId]) conversations[roomId] = [];
            conversations[roomId].push({
                from: data.from,
                message: data.message,
                time: data.time
            });
            localStorage.setItem(`conversations_${currentUser.username}`, JSON.stringify(conversations));
            if (currentChatWith === data.from) addMessageToChat(data.message, false, data.time);
            else loadConversationsList();
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        loadAccounts();
        
        document.getElementById('login-btn').onclick = () => {
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value.trim();
            const errorDiv = document.getElementById('error-msg');
            
            if (!username || !password) {
                errorDiv.textContent = 'املأ جميع الحقول';
                return;
            }
            
            let userData = loginUser(username, password);
            if (userData) {
                startApp(userData);
            } else {
                const displayName = username;
                if (registerUser(username, password, displayName)) {
                    userData = loginUser(username, password);
                    startApp(userData);
                } else {
                    errorDiv.textContent = 'يوزر نيم موجود مسبقاً';
                }
            }
        };
        
        document.getElementById('logout-btn').onclick = () => {
            location.reload();
        };
        
        document.getElementById('post-btn').onclick = () => {
            const text = document.getElementById('post-text').value.trim();
            if (text && currentUser) {
                posts.unshift({
                    id: Date.now(),
                    username: currentUser.username,
                    displayName: currentUser.displayName,
                    text: text,
                    time: new Date().toISOString(),
                    likes: 0
                });
                loadPosts();
                document.getElementById('post-text').value = '';
            }
        };
        
        document.getElementById('back-btn').onclick = () => {
            document.getElementById('chat-area').style.display = 'none';
            document.getElementById('conversations-list').style.display = 'block';
            currentChatWith = null;
        };
        
        document.getElementById('send-chat-btn').onclick = sendChatMessage;
        document.getElementById('chat-input').onkeypress = (e) => {
            if (e.key === 'Enter') sendChatMessage();
        };
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => switchPage(btn.dataset.page);
        });
    });
</script>
</body>
    </html>
