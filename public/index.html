<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>دردشة العراق</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            position: relative;
        }

        /* خلفية علم العراق الشفافة */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                #CE1126 0%, #CE1126 33.33%, 
                #FFFFFF 33.33%, #FFFFFF 66.66%, 
                #007A3D 66.66%, #007A3D 100%);
            opacity: 0.1;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: -1;
        }

        /* حاوية الدردشة */
        .chat-container {
            background: transparent;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* الهيدر */
        .chat-header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 18px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .chat-header h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .online-users {
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        /* منطقة الرسائل */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* تخصيص شريط التمرير */
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* الرسائل */
        .message {
            animation: slideIn 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* اسم المستخدم */
        .message .display-name {
            font-size: 12px;
            font-weight: 600;
            color: #ff6b6b;
            margin-bottom: 4px;
            padding-right: 4px;
        }

        /* اليوزر نيم الصغير */
        .message .username {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 3px;
            padding-right: 4px;
        }

        /* فقاعة الرسالة */
        .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 20px;
            border-bottom-right-radius: 4px;
            max-width: 100%;
            word-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            color: white;
            font-size: 15px;
            line-height: 1.4;
            font-weight: 400;
        }

        /* الوقت */
        .message .time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            padding-right: 8px;
        }

        /* الرسائل النظامية */
        .system-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            margin: 8px 0;
            font-style: italic;
        }

        /* منطقة الإدخال */
        .input-area {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }

        .input-area input:focus {
            background: rgba(255, 255, 255, 0.18);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 15px;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #CE1126 0%, #007A3D 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .input-area button:active {
            transform: scale(0.96);
        }

        /* شاشة تسجيل الدخول */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.97);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .welcome-card {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 28px;
            text-align: center;
            max-width: 340px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .welcome-card h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .welcome-card h1 span {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-card p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 28px;
            font-size: 13px;
        }

        .welcome-card input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            text-align: center;
            outline: none;
            margin-bottom: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }

        .welcome-card input:focus {
            border-color: #CE1126;
        }

        .welcome-card input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .welcome-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #CE1126 0%, #007A3D 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }

        .flag-decoration {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .saved-info {
            margin-top: 18px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .saved-info button {
            background: transparent;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            margin-top: 8px;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 11px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-card">
            <div class="flag-decoration">🇮🇶</div>
            <h1>دردشة <span>العراق</span></h1>
            <p>سجل دخولك وابدأ المحادثة</p>
            
            <input type="text" id="login-username" placeholder="يوزر نيم (مثال: ahmed)" maxlength="20" dir="ltr">
            <input type="text" id="login-displayname" placeholder="الاسم الظاهر (مثال: أبو علي)" maxlength="20">
            
            <button id="login-btn">دخول</button>
            
            <div class="error-msg" id="error-msg"></div>
            
            <div class="saved-info" id="saved-info" style="display: none;">
                <div id="saved-text"></div>
                <button id="use-saved-btn">استخدم الحساب المحفوظ</button>
                <button id="logout-saved-btn" style="background: rgba(206,17,38,0.5); margin-top: 5px;">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <!-- الدردشة -->
    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-header">
            <h3>💬 دردشة العراق</h3>
            <div class="online-users">🟢 <span id="users-count">0</span> متصل</div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="system-message">✨ مرحباً بك في دردشة العراق</div>
        </div>
        <div class="input-area">
            <input type="text" id="message" placeholder="اكتب رسالة..." maxlength="500">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        
        // العناصر
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');
        const loginUsername = document.getElementById('login-username');
        const loginDisplayname = document.getElementById('login-displayname');
        const loginBtn = document.getElementById('login-btn');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const usersCountSpan = document.getElementById('users-count');
        const errorMsg = document.getElementById('error-msg');
        const savedInfo = document.getElementById('saved-info');
        const savedText = document.getElementById('saved-text');
        const useSavedBtn = document.getElementById('use-saved-btn');
        const logoutSavedBtn = document.getElementById('logout-saved-btn');
        
        // حفظ المستخدم
        function saveUser(username, displayName) {
            localStorage.setItem('chat_user', JSON.stringify({ username, displayName }));
        }
        
        // حذف المستخدم المحفوظ
        function logoutUser() {
            localStorage.removeItem('chat_user');
            savedInfo.style.display = 'none';
            loginUsername.value = '';
            loginDisplayname.value = '';
        }
        
        // تحميل المستخدم المحفوظ
        function loadSavedUser() {
            const saved = localStorage.getItem('chat_user');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (user.username && user.displayName) {
                        savedText.innerHTML = `👤 مرحباً ${user.displayName} (${user.username})`;
                        savedInfo.style.display = 'block';
                        return user;
                    }
                } catch(e) {}
            }
            return null;
        }
        
        // بدء الدردشة
        function startChat(username, displayName) {
            currentUser = { username, displayName };
            saveUser(username, displayName);
            
            socket.emit('set-user', { username, displayName });
            
            welcomeScreen.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            addSystemMessage('✨ أهلاً بك ' + displayName);
            messageInput.focus();
        }
        
        // إضافة رسالة نظامية
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // إضافة رسالة دردشة
        function addChatMessage(data) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="display-name">${escapeHtml(data.displayName)}</div>
                <div class="username">@${escapeHtml(data.username)}</div>
                <div class="message-bubble">${escapeHtml(data.message)}</div>
                <div class="time">${data.time}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // التحقق من صحة اليوزر نيم
        function isValidUsername(username) {
            return username.length >= 3 && /^[a-zA-Z0-9_]+$/.test(username);
        }
        
        // زر تسجيل الدخول
        loginBtn.onclick = function() {
            const username = loginUsername.value.trim().toLowerCase();
            const displayName = loginDisplayname.value.trim();
            
            errorMsg.style.display = 'none';
            
            if (username === '') {
                errorMsg.textContent = 'الرجاء إدخال يوزر نيم';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (!isValidUsername(username)) {
                errorMsg.textContent = 'اليوزر نيم يجب أن يحتوي على حروف وأرقام فقط (3 أحرف على الأقل)';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (displayName === '') {
                errorMsg.textContent = 'الرجاء إدخال الاسم الظاهر';
                errorMsg.style.display = 'block';
                return;
            }
            
            startChat(username, displayName);
        };
        
        // استخدام الحساب المحفوظ
        useSavedBtn.onclick = function() {
            const saved = loadSavedUser();
            if (saved) {
                startChat(saved.username, saved.displayName);
            }
        };
        
        // تسجيل خروج
        logoutSavedBtn.onclick = function() {
            logoutUser();
        };
        
        // إرسال رسالة
        sendBtn.onclick = function() {
            const msg = messageInput.value.trim();
            if (msg !== '' && currentUser) {
                socket.emit('send-message', { 
                    message: msg,
                    username: currentUser.username,
                    displayName: currentUser.displayName
                });
                messageInput.value = '';
                messageInput.focus();
            }
        };
        
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        };
        
        loginUsername.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        loginDisplayname.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        // استقبال الأحداث من السيرفر
        socket.on('receive-message', function(data) {
            addChatMessage(data);
        });
        
        socket.on('user-joined', function(data) {
            addSystemMessage(`✨ ${data.displayName} دخل الدردشة`);
        });
        
        socket.on('user-left', function(data) {
            addSystemMessage(`👋 ${data.displayName} غادر`);
        });
        
        socket.on('users-list', function(users) {
            usersCountSpan.textContent = users.length;
        });
        
        socket.on('username-taken', function() {
            errorMsg.textContent = 'هذا اليوزر نيم مستخدم من قبل! اختر يوزر نيم آخر';
            errorMsg.style.display = 'block';
        });
        
        // التحقق من وجود مستخدم محفوظ
        loadSavedUser();
    </script>
</body>
    </html>
