<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة بغداد لايف</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e2e; padding: 30px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #9c27b0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a3a; border: none; border-radius: 25px; color: white; text-align: center; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg,#CE1126,#9c27b0); border: none; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; }
        .error { color: #ff6b6b; margin-top: 10px; font-size: 13px; }
        .success { color: #4caf50; margin-top: 10px; font-size: 13px; }
        h1 { background: linear-gradient(135deg,#CE1126,#9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🇮🇶 دردشة بغداد لايف</h1>
        <p>سجل دخولك</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="displayname" placeholder="الاسم الظاهر (للتسجيل)">
        <button id="login-btn">دخول / تسجيل</button>
        <div class="error" id="error-msg"></div>
        <div class="success" id="success-msg"></div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('chat_users') || '{}');
        
        document.getElementById('login-btn').onclick = () => {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const displayName = document.getElementById('displayname').value.trim();
            const errorDiv = document.getElementById('error-msg');
            const successDiv = document.getElementById('success-msg');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            if (!username || !password) {
                errorDiv.textContent = '❌ املأ جميع الحقول';
                return;
            }
            
            if (!users[username]) {
                users[username] = { 
                    password: password, 
                    displayName: displayName || username,
                    isAdmin: username === '3tx'
                };
                localStorage.setItem('chat_users', JSON.stringify(users));
                successDiv.textContent = `✅ تم تسجيل حساب جديد! مرحباً ${users[username].displayName}`;
                if (username === '3tx') successDiv.textContent = `✅ تم تسجيل المشرف 3tx بنجاح! 👑`;
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('displayname').value = '';
            } else if (users[username].password === password) {
                successDiv.textContent = `✅ مرحباً ${users[username].displayName}${users[username].isAdmin ? ' (المشرف)' : ''}`;
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            } else {
                errorDiv.textContent = '❌ كلمة السر غير صحيحة';
            }
        };
    </script>
</body>
</html>
