<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دردشة بغداد لايف</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #121212;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .login-card {
            background: rgba(30,0,60,0.8); backdrop-filter: blur(15px);
            padding: 35px; border-radius: 35px; width: 100%; max-width: 340px;
            text-align: center; border: 1px solid rgba(156,39,176,0.5);
        }
        .login-card h1 {
            font-size: 28px; margin-bottom: 10px;
            background: linear-gradient(135deg,#CE1126,#9c27b0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-card input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(50,0,80,0.6); border: 1px solid #9c27b0;
            border-radius: 40px; color: white; text-align: center;
        }
        .login-card button {
            width: 100%; padding: 12px; margin-top: 10px;
            background: linear-gradient(135deg,#CE1126,#9c27b0);
            border: none; border-radius: 40px; color: white;
            cursor: pointer; font-weight: bold;
        }
        .error { color: #ff6b6b; margin-top: 10px; }
        .app { display: none; flex-direction: column; height: 100vh; }
        .header {
            background: linear-gradient(135deg, #1a0033, #0a001a);
            padding: 12px 15px;
            border-bottom: 1px solid #9c27b0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 18px;
        }
        .user-name { font-size: 14px; font-weight: bold; }
        .user-username { font-size: 10px; color: #b39ddb; }
        .logout-btn {
            background: #f44336; border: none; padding: 6px 15px;
            border-radius: 20px; color: white; cursor: pointer;
        }
        .tabs {
            display: flex;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-bottom: 1px solid #9c27b0;
        }
        .tab {
            flex: 1; text-align: center; padding: 12px;
            background: none; border: none; color: #b39ddb;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .tab.active { background: linear-gradient(135deg, #CE1126, #9c27b0); color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .new-post {
            background: #1e1e2e; border-radius: 20px; padding: 15px;
            margin-bottom: 20px; border: 1px solid #9c27b0;
        }
        textarea {
            width: 100%; background: #2a2a3a; border: none;
            border-radius: 15px; padding: 12px; color: white;
            resize: none; font-family: inherit;
        }
        .post-btn {
            margin-top: 10px; background: linear-gradient(135deg,#CE1126,#9c27b0);
            border: none; padding: 8px 20px; border-radius: 30px;
            color: white; cursor: pointer;
        }
        .post-card {
            background: #1e1e2e; border-radius: 20px; padding: 15px;
            margin-bottom: 15px; border: 1px solid #9c27b0;
        }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .post-name { font-weight: bold; color: #ffaaaa; }
        .post-time { font-size: 10px; color: #888; }
        .post-text { margin: 10px 0; line-height: 1.4; }
        .like-btn, .delete-btn {
            background: none; border: none; cursor: pointer; font-size: 13px;
        }
        .like-btn { color: #888; }
        .delete-btn { color: #ff6b6b; margin-left: 10px; }
        .user-card {
            background: #1e1e2e; border-radius: 18px; padding: 12px;
            margin-bottom: 12px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #9c27b0;
        }
        .friend-badge { background: #4caf50; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .request-badge { background: #ff9800; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .add-friend, .accept, .reject, .chat-btn {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none; padding: 5px 12px; border-radius: 20px;
            color: white; cursor: pointer; font-size: 11px;
        }
        .accept { background: #4caf50; }
        .reject { background: #f44336; }
        .chat-btn { background: #2196f3; }
        .chat-window {
            display: none; flex-direction: column; height: 100%;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
        }
        .chat-header {
            padding: 12px 15px; background: #2a004a;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #9c27b0;
        }
        .back { background: none; border: none; color: #9c27b0; font-size: 24px; cursor: pointer; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { display: flex; flex-direction: column; align-items: flex-start; max-width: 85%; }
        .msg.own { align-self: flex-end; align-items: flex-end; }
        .bubble {
            background: rgba(156,39,176,0.3); padding: 8px 14px;
            border-radius: 18px; border: 1px solid #9c27b0;
        }
        .msg.own .bubble { background: linear-gradient(135deg, #CE1126, #9c27b0); border: none; }
        .msg-time { font-size: 9px; color: #9c27b0; margin-top: 4px; }
        .chat-input {
            padding: 12px; background: #2a004a; display: flex; gap: 10px;
            border-top: 1px solid #9c27b0;
        }
        .chat-input input {
            flex: 1; padding: 10px; background: rgba(50,0,80,0.6);
            border: 1px solid #9c27b0; border-radius: 30px; color: white;
        }
        .chat-input button {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none; padding: 10px 18px; border-radius: 30px;
            color: white; cursor: pointer;
        }
        .empty { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-card">
        <h1>🇮🇶 دردشة بغداد لايف</h1>
        <p>سجل دخولك</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="displayname" placeholder="الاسم الظاهر (للتسجيل)">
        <button id="login-btn">دخول / تسجيل</button>
        <div class="error" id="error-msg"></div>
    </div>
</div>

<div class="app" id="app">
    <div class="header">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">👤</div>
            <div>
                <div class="user-name" id="user-name">...</div>
                <div class="user-username" id="user-username">@...</div>
            </div>
        </div>
        <button class="logout-btn" id="logout-btn">خروج</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="posts">📱 المنشورات</button>
        <button class="tab" data-tab="users">👥 المستخدمون</button>
        <button class="tab" data-tab="requests">📩 الطلبات</button>
        <button class="tab" data-tab="chats">💬 الدردشات</button>
    </div>

    <div class="main-content">
        <div class="page active" id="posts-page">
            <div class="new-post">
                <textarea id="post-text" placeholder="شارك ما في خاطرك..." rows="3"></textarea>
                <button class="post-btn" id="post-btn">نشر</button>
            </div>
            <div id="posts-list"></div>
        </div>
        <div class="page" id="users-page"><div id="users-list"></div></div>
        <div class="page" id="requests-page"><div id="requests-list"></div></div>
        <div class="page" id="chats-page"><div id="chats-list"></div></div>
    </div>

    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <button class="back" id="chat-back">←</button>
            <span id="chat-with-name"></span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            <button id="send-msg">إرسال</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket, currentUser, currentChatWith;
let conversations = JSON.parse(localStorage.getItem('conv') || '{}');

function escapeHtml(t) { let d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function addMessageToChat(msg, isOwn, time) {
    let div = document.createElement('div');
    div.className = 'msg ' + (isOwn ? 'own' : '');
    div.innerHTML = `<div class="bubble">${escapeHtml(msg)}</div><div class="msg-time">${time || ''}</div>`;
    document.getElementById('chat-messages').appendChild(div);
    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

function switchTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`${tab}-page`).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
}

function startApp(data) {
    currentUser = {
        username: data.username,
        displayName: data.displayName,
        friends: data.friends || [],
        requests: data.requests || []
    };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-name').textContent = data.displayName;
    document.getElementById('user-username').textContent = `@${data.username}`;
    
    // عرض المنشورات
    const postsContainer = document.getElementById('posts-list');
    postsContainer.innerHTML = '';
    [...data.posts].reverse().forEach(post => {
        const isOwn = post.username === currentUser.username;
        const div = document.createElement('div');
        div.className = 'post-card';
        div.dataset.id = post.id;
        div.innerHTML = `
            <div class="post-header">
                <div class="post-name">${escapeHtml(post.displayName)}</div>
                <div class="post-time">${new Date(post.time).toLocaleTimeString()}</div>
            </div>
            <div class="post-text">${escapeHtml(post.text)}</div>
            <button class="like-btn">❤️ ${post.likes || 0}</button>
            ${isOwn ? '<button class="delete-btn">🗑️ حذف</button>' : ''}
        `;
        div.querySelector('.like-btn').onclick = () => socket.emit('like-post', post.id);
        if (isOwn) div.querySelector('.delete-btn').onclick = () => socket.emit('delete-post', post.id);
        postsContainer.appendChild(div);
    });
    
    // عرض المستخدمين
    const usersContainer = document.getElementById('users-list');
    usersContainer.innerHTML = '';
    data.users.forEach(u => {
        if (u.username === currentUser.username) return;
        const isFriend = currentUser.friends.includes(u.username);
        const hasRequest = currentUser.requests.includes(u.username);
        const div = document.createElement('div');
        div.className = 'user-card';
        div.innerHTML = `
            <div>
                <strong>${escapeHtml(u.displayName)}</strong>
                ${isFriend ? '<span class="friend-badge">صديق</span>' : ''}
                ${hasRequest ? '<span class="request-badge">طلب وارد</span>' : ''}
                <br><small>@${escapeHtml(u.username)}</small>
            </div>
            <div>
                ${!isFriend && !hasRequest ? `<button class="add-friend" data-user="${u.username}">➕ إضافة</button>` : ''}
                ${hasRequest ? `<button class="accept" data-user="${u.username}">✅ قبول</button> <button class="reject" data-user="${u.username}">❌ رفض</button>` : ''}
                ${isFriend ? `<button class="chat-btn" data-user="${u.username}">💬 دردشة</button>` : ''}
            </div>
        `;
        div.querySelector('.add-friend')?.addEventListener('click', () => socket.emit('add-friend', u.username));
        div.querySelector('.accept')?.addEventListener('click', () => socket.emit('accept-friend', u.username));
        div.querySelector('.reject')?.addEventListener('click', () => socket.emit('reject-friend', u.username));
        div.querySelector('.chat-btn')?.addEventListener('click', () => openChat(u.username));
        usersContainer.appendChild(div);
    });
    
    // عرض الطلبات
    const requestsContainer = document.getElementById('requests-list');
    requestsContainer.innerHTML = '';
    if (currentUser.requests.length === 0) {
        requestsContainer.innerHTML = '<div class="empty">لا توجد طلبات</div>';
    } else {
        currentUser.requests.forEach(req => {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `
                <div><strong>${escapeHtml(req)}</strong><br><small>@${escapeHtml(req)}</small></div>
                <div>
                    <button class="accept" data-user="${req}">✅ قبول</button>
                    <button class="reject" data-user="${req}">❌ رفض</button>
                </div>
            `;
            div.querySelector('.accept').onclick = () => socket.emit('accept-friend', req);
            div.querySelector('.reject').onclick = () => socket.emit('reject-friend', req);
            requestsContainer.appendChild(div);
        });
    }
    
    // عرض الدردشات
    const chatsContainer = document.getElementById('chats-list');
    chatsContainer.innerHTML = '';
    if (currentUser.friends.length === 0) {
        chatsContainer.innerHTML = '<div class="empty">لا توجد محادثات</div>';
    } else {
        currentUser.friends.forEach(f => {
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `
                <div><strong>${escapeHtml(f)}</strong><br><small>@${escapeHtml(f)}</small></div>
                <div><button class="chat-btn" data-user="${f}">💬 دردشة</button></div>
            `;
            div.querySelector('.chat-btn').onclick = () => openChat(f);
            chatsContainer.appendChild(div);
        });
    }
    
    socket.on('post-added', (post) => {
        const div = document.createElement('div');
        div.className = 'post-card';
        div.dataset.id = post.id;
        const isOwn = post.username === currentUser.username;
        div.innerHTML = `
            <div class="post-header">
                <div class="post-name">${escapeHtml(post.displayName)}</div>
                <div class="post-time">${new Date(post.time).toLocaleTimeString()}</div>
            </div>
            <div class="post-text">${escapeHtml(post.text)}</div>
            <button class="like-btn">❤️ ${post.likes || 0}</button>
            ${isOwn ? '<button class="delete-btn">🗑️ حذف</button>' : ''}
        `;
        div.querySelector('.like-btn').onclick = () => socket.emit('like-post', post.id);
        if (isOwn) div.querySelector('.delete-btn').onclick = () => socket.emit('delete-post', post.id);
        document.getElementById('posts-list').prepend(div);
    });
    
    socket.on('post-updated', (post) => {
        const el = document.querySelector(`.post-card[data-id="${post.id}"]`);
        if (el) el.querySelector('.like-btn').innerHTML = `❤️ ${post.likes}`;
    });
    
    socket.on('post-deleted', (id) => {
        document.querySelector(`.post-card[data-id="${id}"]`)?.remove();
    });
    
    socket.on('new-request', (d) => {
        currentUser.requests.push(d.from);
        const requestsContainer = document.getElementById('requests-list');
        if (requestsContainer.querySelector('.empty')) requestsContainer.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'user-card';
        div.innerHTML = `
            <div><strong>${escapeHtml(d.fromName)}</strong><br><small>@${escapeHtml(d.from)}</small></div>
            <div>
                <button class="accept" data-user="${d.from}">✅ قبول</button>
                <button class="reject" data-user="${d.from}">❌ رفض</button>
            </div>
        `;
        div.querySelector('.accept').onclick = () => socket.emit('accept-friend', d.from);
        div.querySelector('.reject').onclick = () => socket.emit('reject-friend', d.from);
        requestsContainer.appendChild(div);
    });
    
    socket.on('request-accepted', (d) => {
        if (!currentUser.friends.includes(d.from)) currentUser.friends.push(d.from);
        currentUser.requests = currentUser.requests.filter(u => u !== d.from);
        const chatsContainer = document.getElementById('chats-list');
        if (chatsContainer.querySelector('.empty')) chatsContainer.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'user-card';
        div.innerHTML = `<div><strong>${escapeHtml(d.fromName)}</strong><br><small>@${escapeHtml(d.from)}</small></div><div><button class="chat-btn" data-user="${d.from}">💬 دردشة</button></div>`;
        div.querySelector('.chat-btn').onclick = () => openChat(d.from);
        chatsContainer.appendChild(div);
        const requestsContainer = document.getElementById('requests-list');
        const requestDiv = Array.from(requestsContainer.children).find(el => el.querySelector(`[data-user="${d.from}"]`))?.parentElement?.parentElement;
        if (requestDiv) requestDiv.remove();
        if (requestsContainer.children.length === 0) requestsContainer.innerHTML = '<div class="empty">لا توجد طلبات</div>';
        const usersContainer = document.getElementById('users-list');
        const userDiv = Array.from(usersContainer.children).find(el => el.querySelector(`[data-user="${d.from}"]`));
        if (userDiv) userDiv.remove();
    });
    
    socket.on('new-message', (d) => {
        const roomId = [currentUser.username, d.from].sort().join('-');
        if (!conversations[roomId]) conversations[roomId] = [];
        conversations[roomId].push({ from: d.from, message: d.message, time: d.time });
        localStorage.setItem('conv', JSON.stringify(conversations));
        if (currentChatWith === d.from) addMessageToChat(d.message, false, d.time);
    });
}

function openChat(username) {
    if (!currentUser.friends.includes(username)) return;
    currentChatWith = username;
    document.querySelector('.main-content').style.display = 'none';
    document.querySelector('.tabs').style.display = 'none';
    document.getElementById('chat-window').style.display = 'flex';
    document.getElementById('chat-with-name').textContent = username;
    const roomId = [currentUser.username, username].sort().join('-');
    const msgs = conversations[roomId] || [];
    const msgsDiv = document.getElementById('chat-messages');
    msgsDiv.innerHTML = '';
    msgs.forEach(m => addMessageToChat(m.message, m.from === currentUser.username, m.time));
}

function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg || !currentChatWith) return;
    socket.emit('private-message', { to: currentChatWith, message: msg });
    const roomId = [currentUser.username, currentChatWith].sort().join('-');
    if (!conversations[roomId]) conversations[roomId] = [];
    conversations[roomId].push({ from: currentUser.username, message: msg, time: new Date().toLocaleTimeString() });
    localStorage.setItem('conv', JSON.stringify(conversations));
    addMessageToChat(msg, true, new Date().toLocaleTimeString());
    input.value = '';
}

document.getElementById('login-btn').onclick = () => {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value.trim();
    const displayName = document.getElementById('displayname').value.trim();
    const err = document.getElementById('error-msg');
    if (!username || !password) { err.textContent = 'املأ الحقول'; return; }
    socket = io();
    socket.on('connect', () => socket.emit('login', { username, password, displayName: displayName || username }));
    socket.on('login-success', startApp);
    socket.on('login-error', (m) => err.textContent = m);
};

document.getElementById('logout-btn').onclick = () => { location.reload(); };
document.getElementById('post-btn').onclick = () => {
    const text = document.getElementById('post-text').value.trim();
    if (text && socket) socket.emit('new-post', { text });
    document.getElementById('post-text').value = '';
};
document.getElementById('chat-back').onclick = () => {
    document.getElementById('chat-window').style.display = 'none';
    document.querySelector('.main-content').style.display = 'block';
    document.querySelector('.tabs').style.display = 'flex';
    currentChatWith = null;
};
document.getElementById('send-msg').onclick = sendMessage;
document.getElementById('chat-input').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
document.querySelectorAll('.tab').forEach(tab => tab.onclick = () => switchTab(tab.dataset.tab));
</script>
</body>
</html>
