<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>بغداد لايف | تواصل اجتماعي</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app">
        <!-- الشريط الجانبي الأيمن -->
        <aside class="sidebar">
            <div class="logo">
                <h2>🇮🇶 بغداد لايف</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-page="home">🏠 الرئيسية</button>
                <button class="nav-btn" data-page="chat">💬 المحادثات</button>
                <button class="nav-btn" data-page="profile">👤 ملفي</button>
            </nav>
            <div class="user-info" id="user-info">
                <div class="user-avatar" id="user-avatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="user-name">...</div>
                    <div class="user-username" id="user-username">@...</div>
                </div>
                <button class="logout-btn" id="logout-btn" title="تسجيل خروج">🚪</button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <!-- صفحة الرئيسية -->
            <div id="home-page">
                <div class="create-post">
                    <textarea id="post-text" placeholder="شارك شي مع الجميع..." rows="3"></textarea>
                    <button class="post-btn" id="post-btn">نشر</button>
                </div>
                <div class="posts-feed" id="posts-feed"></div>
            </div>

            <!-- صفحة المحادثات -->
            <div id="chat-page" style="display: none;">
                <div class="chat-container">
                    <div class="conversations-list" id="conversations-list"></div>
                    <div class="chat-area" id="chat-area" style="display: none;">
                        <div class="chat-header">
                            <button class="back-btn" id="back-btn">←</button>
                            <span id="chat-partner-name"></span>
                            <button class="block-btn" id="block-btn">🚫 حظر</button>
                        </div>
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
                            <button id="send-chat-btn">إرسال</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- صفحة الملف الشخصي -->
            <div id="profile-page" style="display: none;">
                <div class="profile-card">
                    <div class="profile-avatar" id="profile-avatar">👤</div>
                    <h2 id="profile-name">...</h2>
                    <p id="profile-username">@...</p>
                    <div class="profile-section">
                        <h3>📝 منشوراتي</h3>
                        <div id="my-posts"></div>
                    </div>
                    <div class="profile-section">
                        <h3>🚫 المستخدمون المحظورون</h3>
                        <div id="blocked-list"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- الشريط الجانبي الأيسر (قائمة المستخدمين) -->
        <aside class="users-sidebar">
            <h3>👥 المستخدمون النشطون</h3>
            <div class="users-list" id="users-list">
                <div class="loading">جاري التحميل...</div>
            </div>
        </aside>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <div class="flag">🇮🇶</div>
            <h2>بغداد لايف</h2>
            <p>سجل دخولك للتواصل مع الآخرين</p>
            <input type="text" id="login-username" placeholder="يوزر نيم (مثال: ahmed)" maxlength="20">
            <input type="text" id="login-displayname" placeholder="الاسم الظاهر" maxlength="20">
            <button id="login-btn">دخول</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js"></script>
</body>
        </html>
