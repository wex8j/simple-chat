<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>دردشة العراق</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            position: relative;
            background: #1a1a2e;
        }

        /* خلفية علم العراق الشفافة */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                #CE1126 0%, #CE1126 33.33%, 
                #FFFFFF 33.33%, #FFFFFF 66.66%, 
                #007A3D 66.66%, #007A3D 100%);
            opacity: 0.12;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: -1;
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #CE1126 0%, #007A3D 100%);
            padding: 18px 16px;
            text-align: center;
        }

        .chat-header h3 {
            color: white;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .chat-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 11px;
        }

        .online-users {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            margin-top: 8px;
            font-size: 11px;
            color: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #CE1126;
            border-radius: 10px;
        }

        .message {
            animation: slideIn 0.3s ease;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* صورة البروفايل في الرسالة */
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #CE1126;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message .username {
            font-weight: bold;
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .message .text {
            background: rgba(255, 255, 255, 0.12);
            padding: 10px 14px;
            border-radius: 18px;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            color: white;
            font-size: 14px;
            line-height: 1.4;
        }

        .message .time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .system-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            margin: 8px 0;
            font-style: italic;
        }

        .input-area {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .input-area input:focus {
            border-color: #CE1126;
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #CE1126 0%, #007A3D 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-area button:active {
            transform: scale(0.97);
        }

        /* شاشة تسجيل الدخول */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.97);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .welcome-card {
            background: rgba(25, 25, 35, 0.98);
            border-radius: 32px;
            padding: 35px 25px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .welcome-card h1 {
            color: white;
            font-size: 26px;
            margin-bottom: 8px;
        }

        .welcome-card h1 span {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
            font-size: 13px;
        }

        .avatar-selection {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }

        .avatar-option.selected {
            border-color: #CE1126;
            background: rgba(206, 17, 38, 0.3);
            transform: scale(1.05);
        }

        .avatar-option:hover {
            transform: scale(1.05);
        }

        .welcome-card input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .welcome-card input:focus {
            border-color: #CE1126;
        }

        .welcome-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #CE1126 0%, #007A3D 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        .welcome-card button:active {
            transform: scale(0.98);
        }

        .flag-decoration {
            font-size: 45px;
            margin-bottom: 12px;
        }

        .saved-user-info {
            margin-top: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .saved-user-info button {
            background: transparent;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-card">
            <div class="flag-decoration">🇮🇶</div>
            <h1>دردشة <span>العراق</span></h1>
            <p>اختار صورتك واسمك وابدأ المحادثة</p>
            
            <div class="avatar-selection" id="avatar-selection">
                <div class="avatar-option" data-avatar="😀">😀</div>
                <div class="avatar-option" data-avatar="😎">😎</div>
                <div class="avatar-option" data-avatar="🦁">🦁</div>
                <div class="avatar-option" data-avatar="🐺">🐺</div>
                <div class="avatar-option" data-avatar="🐉">🐉</div>
                <div class="avatar-option" data-avatar="⭐">⭐</div>
                <div class="avatar-option" data-avatar="🎮">🎮</div>
                <div class="avatar-option" data-avatar="🎵">🎵</div>
            </div>
            
            <input type="text" id="welcome-username" placeholder="اكتب اسم المستخدم..." maxlength="20">
            <button id="start-chat-btn">دخول</button>
            
            <div class="saved-user-info" id="saved-user-info" style="display: none;">
                <div id="saved-info-text"></div>
                <button id="use-saved-btn">استخدم الحساب المحفوظ</button>
            </div>
        </div>
    </div>

    <!-- الدردشة -->
    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-header">
            <h3>💬 دردشة العراق</h3>
            <p>تواصل بكل احترافية</p>
            <div class="online-users">🟢 المتصلون: <span id="users-count">0</span></div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="system-message">✨ مرحباً بك في دردشة العراق</div>
        </div>
        <div class="input-area">
            <input type="text" id="message" placeholder="اكتب رسالتك..." maxlength="200">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        
        // العناصر
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');
        const welcomeUsername = document.getElementById('welcome-username');
        const startBtn = document.getElementById('start-chat-btn');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const usersCountSpan = document.getElementById('users-count');
        const savedUserInfo = document.getElementById('saved-user-info');
        const savedInfoText = document.getElementById('saved-info-text');
        const useSavedBtn = document.getElementById('use-saved-btn');
        
        let selectedAvatar = '😀';
        
        // اختيار الصورة
        document.querySelectorAll('.avatar-option').forEach(option => {
            option.onclick = function() {
                document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                selectedAvatar = this.getAttribute('data-avatar');
            };
        });
        document.querySelector('.avatar-option').classList.add('selected');
        
        // حفظ المستخدم في LocalStorage
        function saveUser(username, avatar) {
            const userData = { username, avatar };
            localStorage.setItem('chat_user', JSON.stringify(userData));
        }
        
        // تحميل المستخدم المحفوظ
        function loadSavedUser() {
            const saved = localStorage.getItem('chat_user');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (user.username && user.avatar) {
                        savedInfoText.innerHTML = `👤 ${user.username} ${user.avatar}`;
                        savedUserInfo.style.display = 'block';
                        return user;
                    }
                } catch(e) {}
            }
            return null;
        }
        
        // بدء الدردشة
        function startChat(username, avatar) {
            currentUser = { username, avatar };
            saveUser(username, avatar);
            socket.emit('set-user', { username, avatar });
            welcomeScreen.style.display = 'none';
            chatContainer.style.display = 'flex';
            addMessage('✨ أهلاً بك ' + username, true);
            messageInput.focus();
        }
        
        // إضافة رسالة
        function addMessage(data, isSystem = false) {
            const div = document.createElement('div');
            if (isSystem) {
                div.className = 'system-message';
                div.textContent = data;
            } else {
                div.className = 'message';
                div.innerHTML = `
                    <div class="message-avatar">${data.avatar || '😀'}</div>
                    <div class="message-content">
                        <div class="username">${escapeHtml(data.username)}</div>
                        <div class="text">${escapeHtml(data.message)}</div>
                        <div class="time">${data.time}</div>
                    </div>
                `;
            }
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // زر بدء الدردشة
        startBtn.onclick = function() {
            const name = welcomeUsername.value.trim();
            if (name !== '') {
                startChat(name, selectedAvatar);
            } else {
                alert('الرجاء إدخال اسم المستخدم');
            }
        };
        
        // استخدام الحساب المحفوظ
        useSavedBtn.onclick = function() {
            const saved = loadSavedUser();
            if (saved) {
                startChat(saved.username, saved.avatar);
            }
        };
        
        // إرسال رسالة
        sendBtn.onclick = function() {
            const msg = messageInput.value.trim();
            if (msg !== '' && currentUser) {
                socket.emit('send-message', { 
                    message: msg,
                    username: currentUser.username,
                    avatar: currentUser.avatar
                });
                messageInput.value = '';
                messageInput.focus();
            }
        };
        
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendBtn.click();
        };
        
        welcomeUsername.onkeypress = function(e) {
            if (e.key === 'Enter') startBtn.click();
        };
        
        // استقبال الأحداث
        socket.on('receive-message', function(data) {
            addMessage(data);
        });
        
        socket.on('user-joined', function(data) {
            addMessage(`✨ ${data.username} دخل الدردشة`, true);
        });
        
        socket.on('user-left', function(data) {
            addMessage(`👋 ${data.username} غادر الدردشة`, true);
        });
        
        socket.on('users-list', function(users) {
            usersCountSpan.textContent = users.length;
        });
        
        // التحقق من وجود مستخدم محفوظ
        loadSavedUser();
    </script>
</body>
    </html>
