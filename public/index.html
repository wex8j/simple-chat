<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة بسيطة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
        }
        .username {
            font-weight: bold;
            color: #667eea;
        }
        .text {
            background: white;
            padding: 8px 12px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 5px;
        }
        .system-message {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 10px 0;
        }
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h3>💬 الدردشة العامة</h3>
            <div>المتصلون: <span id="users-count">0</span></div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="system-message">✨ أهلاً بك! ادخل اسمك وابدأ المحادثة</div>
        </div>
        <div class="input-area" id="username-area">
            <input type="text" id="username" placeholder="اسمك..." maxlength="20">
            <button id="join-btn">دخول</button>
        </div>
        <div class="input-area" id="chat-area" style="display:none">
            <input type="text" id="message" placeholder="اكتب رسالتك..." maxlength="200">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let username = '';

        const joinBtn = document.getElementById('join-btn');
        const usernameInput = document.getElementById('username');
        const usernameArea = document.getElementById('username-area');
        const chatArea = document.getElementById('chat-area');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const usersCountSpan = document.getElementById('users-count');

        function addMessage(data, isSystem = false) {
            const div = document.createElement('div');
            if (isSystem) {
                div.className = 'system-message';
                div.textContent = data;
            } else {
                div.className = 'message';
                div.innerHTML = \`
                    <div class="username">\${data.username}</div>
                    <div class="text">\${data.message}</div>
                    <div style="font-size:11px;color:#999">\${data.time}</div>
                \`;
            }
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        joinBtn.onclick = () => {
            const name = usernameInput.value.trim();
            if (name) {
                username = name;
                socket.emit('set-username', username);
                usernameArea.style.display = 'none';
                chatArea.style.display = 'flex';
                addMessage(\`✨ أهلاً بك \${username}\`, true);
                messageInput.focus();
            }
        };

        sendBtn.onclick = () => {
            const msg = messageInput.value.trim();
            if (msg) {
                socket.emit('send-message', { message: msg });
                messageInput.value = '';
                messageInput.focus();
            }
        };

        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendBtn.click();
        };

        usernameInput.onkeypress = (e) => {
            if (e.key === 'Enter') joinBtn.click();
        };

        socket.on('receive-message', (data) => addMessage(data));
        socket.on('user-joined', (msg) => addMessage(msg, true));
        socket.on('user-left', (msg) => addMessage(msg, true));
        socket.on('users-list', (users) => {
            usersCountSpan.textContent = users.length;
        });
    </script>
</body>
      </html>
