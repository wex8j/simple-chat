<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دردشة بغداد لايف</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #121212; color: #fff;
            height: 100vh; overflow: hidden;
        }
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .login-card {
            background: rgba(30,0,60,0.8); backdrop-filter: blur(15px);
            padding: 35px; border-radius: 35px; width: 100%; max-width: 340px;
            text-align: center; border: 1px solid rgba(156,39,176,0.5);
        }
        .login-card h1 {
            font-size: 28px; margin-bottom: 10px;
            background: linear-gradient(135deg,#CE1126,#9c27b0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-card p { color: #b39ddb; margin-bottom: 15px; }
        .login-card input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(50,0,80,0.6); border: 1px solid #9c27b0;
            border-radius: 40px; color: white; text-align: center; font-size: 15px;
        }
        .login-card input::placeholder { color: #7c5a8a; }
        .login-card button {
            width: 100%; padding: 12px; margin-top: 10px;
            background: linear-gradient(135deg,#CE1126,#9c27b0);
            border: none; border-radius: 40px; color: white;
            cursor: pointer; font-weight: bold; font-size: 16px;
        }
        .error { color: #ff6b6b; margin-top: 10px; font-size: 13px; }
        .app { display: none; flex-direction: column; height: 100vh; }
        .header {
            background: linear-gradient(135deg, #1a0033, #0a001a);
            padding: 12px 15px; border-bottom: 1px solid #9c27b0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer;
            background-size: cover; background-position: center;
        }
        .user-avatar.admin-avatar {
            background: url('https://g.top4top.io/p_37443983d0.gif') !important;
            background-size: cover !important;
            animation: adminGlow 1.5s ease-in-out infinite;
            box-shadow: 0 0 15px #ffd700;
        }
        @keyframes adminGlow {
            0%,100% { box-shadow: 0 0 5px #ffd700; transform: scale(1); }
            50% { box-shadow: 0 0 20px #ff8c00; transform: scale(1.05); }
        }
        .vip-badge {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000; font-size: 9px; padding: 2px 6px;
            border-radius: 20px; margin-right: 5px; font-weight: bold;
        }
        .user-name { font-size: 14px; font-weight: bold; }
        .user-username { font-size: 10px; color: #b39ddb; }
        .logout-btn {
            background: #f44336; border: none; padding: 6px 15px;
            border-radius: 20px; color: white; cursor: pointer; font-size: 13px;
        }
        .tabs {
            display: flex;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            border-bottom: 1px solid #9c27b0;
        }
        .tab {
            flex: 1; text-align: center; padding: 11px 5px;
            background: none; border: none; color: #b39ddb;
            font-size: 13px; font-weight: bold; cursor: pointer;
        }
        .tab.active { background: linear-gradient(135deg, #CE1126, #9c27b0); color: white; }
        .main-content { flex: 1; overflow-y: auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .new-post {
            background: #1e1e2e; border-radius: 20px; padding: 15px;
            margin-bottom: 20px; border: 1px solid #9c27b0;
        }
        textarea {
            width: 100%; background: #2a2a3a; border: none;
            border-radius: 15px; padding: 12px; color: white;
            resize: none; font-family: inherit; font-size: 14px;
        }
        .post-btn {
            margin-top: 10px; background: linear-gradient(135deg,#CE1126,#9c27b0);
            border: none; padding: 8px 25px; border-radius: 30px;
            color: white; cursor: pointer; font-size: 14px;
        }
        .post-card {
            background: #1e1e2e; border-radius: 20px; padding: 15px;
            margin-bottom: 15px; border: 1px solid #9c27b0;
        }
        .post-header { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
        .post-avatar {
            width: 40px; height: 40px; min-width: 40px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 18px; background-size: cover; background-position: center;
        }
        .post-avatar.admin-avatar {
            background: url('https://g.top4top.io/p_37443983d0.gif') !important;
            background-size: cover !important;
        }
        .post-info { flex: 1; }
        .post-name { font-weight: bold; color: #ffaaaa; font-size: 14px; }
        .post-username { font-size: 10px; color: #b39ddb; }
        .post-time { font-size: 10px; color: #888; white-space: nowrap; }
        .post-text { margin: 10px 0; line-height: 1.6; font-size: 14px; }
        .post-actions {
            display: flex; gap: 15px; margin-top: 10px;
            padding-top: 10px; border-top: 1px solid #2a2a3a;
        }
        .like-btn, .delete-btn {
            background: none; border: none; cursor: pointer; font-size: 13px; color: #888;
        }
        .like-btn.liked { color: #ff6b6b; }
        .delete-btn { color: #ff6b6b; }
        .user-card {
            background: #1e1e2e; border-radius: 18px; padding: 12px;
            margin-bottom: 12px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #9c27b0;
        }
        .user-card-avatar {
            width: 38px; height: 38px; min-width: 38px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 16px; background-size: cover; background-position: center;
        }
        .user-card-avatar.admin-avatar {
            background: url('https://g.top4top.io/p_37443983d0.gif') !important;
            background-size: cover !important;
        }
        .friend-badge { background: #4caf50; padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-right: 5px; }
        .request-badge { background: #ff9800; padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-right: 5px; }
        .action-btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .add-friend, .accept, .reject, .chat-btn {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none; padding: 6px 12px; border-radius: 20px;
            color: white; cursor: pointer; font-size: 11px; white-space: nowrap;
        }
        .accept { background: linear-gradient(135deg, #2e7d32, #4caf50); }
        .reject { background: linear-gradient(135deg, #b71c1c, #f44336); }
        .chat-btn { background: linear-gradient(135deg, #1565c0, #2196f3); }
        .chat-window {
            display: none; flex-direction: column;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
            background: linear-gradient(135deg, #1a0033, #0a001a);
        }
        .chat-header {
            padding: 12px 15px; background: #2a004a;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #9c27b0;
        }
        .back { background: none; border: none; color: #9c27b0; font-size: 26px; cursor: pointer; }
        .chat-title { font-weight: bold; font-size: 16px; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg { display: flex; flex-direction: column; align-items: flex-start; max-width: 80%; }
        .msg.own { align-self: flex-end; align-items: flex-end; }
        .bubble {
            background: rgba(156,39,176,0.25); padding: 9px 14px;
            border-radius: 18px; border: 1px solid rgba(156,39,176,0.4);
            font-size: 14px; line-height: 1.5; word-break: break-word;
        }
        .msg.own .bubble {
            background: linear-gradient(135deg, #CE1126, #9c27b0); border: none;
        }
        .msg-time { font-size: 9px; color: #9c27b0; margin-top: 4px; }
        .chat-input {
            padding: 12px; background: #2a004a;
            display: flex; gap: 10px; border-top: 1px solid #9c27b0;
        }
        .chat-input input {
            flex: 1; padding: 10px 15px; background: rgba(50,0,80,0.6);
            border: 1px solid #9c27b0; border-radius: 30px; color: white; font-size: 14px;
        }
        .chat-input button {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none; padding: 10px 20px; border-radius: 30px;
            color: white; cursor: pointer; font-size: 14px; font-weight: bold;
        }
        .empty { text-align: center; color: #666; padding: 50px 20px; font-size: 15px; }
        .profile-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 3000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .profile-modal.active { display: flex; }
        .profile-card {
            background: #1e1e2e; border-radius: 30px; padding: 25px;
            width: 100%; max-width: 320px; text-align: center;
            border: 1px solid #9c27b0;
        }
        .profile-card h3 { margin-bottom: 20px; font-size: 18px; }
        .profile-avatar-large {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border-radius: 50%; margin: 0 auto 15px;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; font-size: 40px;
        }
        .upload-btn {
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none; padding: 12px; border-radius: 30px;
            color: white; cursor: pointer; width: 100%; margin-top: 10px; font-size: 15px;
        }
        .close-modal {
            background: none; border: 1px solid #9c27b0; color: #9c27b0;
            font-size: 14px; cursor: pointer; margin-top: 12px;
            padding: 8px 20px; border-radius: 20px; width: 100%;
        }
        .hidden-file { display: none; }
        .section-title { color: #b39ddb; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div class="login-screen" id="login-screen">
    <div class="login-card">
        <h1>🇮🇶 دردشة بغداد لايف</h1>
        <p>سجل دخولك أو أنشئ حساب جديد</p>
        <input type="text" id="username" placeholder="اسم المستخدم (بالانجليزي)">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="displayname" placeholder="اسمك الظاهر (للتسجيل فقط)">
        <button id="login-btn">دخول / تسجيل</button>
        <div class="error" id="error-msg"></div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div class="app" id="app">
    <div class="header">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar" title="اضغط لتغيير الصورة">👤</div>
            <div>
                <div class="user-name" id="user-name">...</div>
                <div class="user-username" id="user-username">@...</div>
            </div>
        </div>
        <button class="logout-btn" id="logout-btn">🚪 خروج</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="posts">📱 المنشورات</button>
        <button class="tab" data-tab="users">👥 المستخدمون</button>
        <button class="tab" data-tab="requests">📩 الطلبات</button>
        <button class="tab" data-tab="chats">💬 الدردشات</button>
    </div>

    <div class="main-content">
        <!-- المنشورات -->
        <div class="page active" id="posts-page">
            <div class="new-post">
                <textarea id="post-text" placeholder="شارك ما في خاطرك..." rows="3"></textarea>
                <button class="post-btn" id="post-btn">📤 نشر</button>
            </div>
            <div id="posts-list"></div>
        </div>
        <!-- المستخدمون -->
        <div class="page" id="users-page">
            <div class="section-title">👥 جميع المستخدمين</div>
            <div id="users-list"></div>
        </div>
        <!-- الطلبات -->
        <div class="page" id="requests-page">
            <div class="section-title">📩 طلبات الصداقة الواردة</div>
            <div id="requests-list"></div>
        </div>
        <!-- الدردشات -->
        <div class="page" id="chats-page">
            <div class="section-title">💬 محادثاتك</div>
            <div id="chats-list"></div>
        </div>
    </div>

    <!-- نافذة الدردشة -->
    <div class="chat-window" id="chat-window">
        <div class="chat-header">
            <button class="back" id="chat-back">←</button>
            <div class="chat-avatar user-card-avatar" id="chat-avatar" style="font-size:16px;">👤</div>
            <span class="chat-title" id="chat-with-name"></span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="اكتب رسالة...">
            <button id="send-msg">إرسال</button>
        </div>
    </div>
</div>

<!-- نافذة تعديل الصورة -->
<div class="profile-modal" id="profile-modal">
    <div class="profile-card">
        <h3>📷 تغيير الصورة الشخصية</h3>
        <div class="profile-avatar-large" id="profile-avatar-large">👤</div>
        <input type="file" id="avatar-file" accept="image/*" class="hidden-file">
        <button class="upload-btn" id="upload-btn">🖼️ اختر صورة من جهازك</button>
        <button class="close-modal" id="close-modal">إلغاء</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket = null;
let currentUser = null;
let currentChatWith = null;
let conversations = JSON.parse(localStorage.getItem('conv_v2') || '{}');

// ===== مساعدات =====
function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t || '';
    return d.innerHTML;
}

function saveConversations() {
    localStorage.setItem('conv_v2', JSON.stringify(conversations));
}

function getAvatar(u) {
    // يرجع كائن {isAdmin, isImage, value}
    if (!u) return { isAdmin: false, isImage: false, value: '👤' };
    if (u.username === '3tx') return { isAdmin: true };
    if (u.avatarType === 'image' && u.avatar) return { isAdmin: false, isImage: true, value: u.avatar };
    return { isAdmin: false, isImage: false, value: u.avatar || '👤' };
}

function applyAvatar(el, av) {
    if (av.isAdmin) {
        el.classList.add('admin-avatar');
        el.textContent = '';
        el.style.backgroundImage = '';
    } else if (av.isImage) {
        el.classList.remove('admin-avatar');
        el.style.backgroundImage = `url('${av.value}')`;
        el.style.backgroundSize = 'cover';
        el.style.backgroundPosition = 'center';
        el.textContent = '';
    } else {
        el.classList.remove('admin-avatar');
        el.style.backgroundImage = '';
        el.textContent = av.value;
    }
}

// ===== إضافة رسالة للدردشة =====
function addMessageToChat(msg, isOwn, time) {
    const div = document.createElement('div');
    div.className = 'msg' + (isOwn ? ' own' : '');
    div.innerHTML = `<div class="bubble">${escapeHtml(msg)}</div><div class="msg-time">${time || ''}</div>`;
    const msgDiv = document.getElementById('chat-messages');
    msgDiv.appendChild(div);
    msgDiv.scrollTop = msgDiv.scrollHeight;
}

// ===== تبديل التبويبات =====
function switchTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`${tab}-page`).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
}

// ===== فتح الدردشة =====
function openChat(username, displayName, avatarInfo) {
    if (!currentUser.friends.includes(username)) return;
    currentChatWith = username;

    document.querySelector('.main-content').style.display = 'none';
    document.querySelector('.tabs').style.display = 'none';
    document.getElementById('chat-window').style.display = 'flex';
    document.getElementById('chat-with-name').textContent = displayName || username;

    const chatAv = document.getElementById('chat-avatar');
    if (avatarInfo) applyAvatar(chatAv, avatarInfo);

    const roomId = [currentUser.username, username].sort().join('-');
    const msgs = conversations[roomId] || [];
    const msgsDiv = document.getElementById('chat-messages');
    msgsDiv.innerHTML = '';
    msgs.forEach(m => addMessageToChat(m.message, m.from === currentUser.username, m.time));
}

// ===== إرسال رسالة =====
function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg || !currentChatWith || !socket) return;

    socket.emit('private-message', { to: currentChatWith, message: msg });
    const roomId = [currentUser.username, currentChatWith].sort().join('-');
    if (!conversations[roomId]) conversations[roomId] = [];
    const time = new Date().toLocaleTimeString('ar-IQ');
    conversations[roomId].push({ from: currentUser.username, message: msg, time });
    saveConversations();
    addMessageToChat(msg, true, time);
    input.value = '';
}

// ===== بناء بطاقة منشور =====
function buildPostCard(post) {
    const isOwn = post.username === currentUser.username;
    const av = getAvatar(post);
    const div = document.createElement('div');
    div.className = 'post-card';
    div.dataset.id = post.id;
    const avStyle = av.isImage ? `background-image: url('${av.value}'); background-size: cover; background-position: center;` : '';
    const avText = (!av.isAdmin && !av.isImage) ? escapeHtml(av.value) : '';
    div.innerHTML = `
        <div class="post-header">
            <div class="post-avatar ${av.isAdmin ? 'admin-avatar' : ''}" style="${avStyle}">${avText}</div>
            <div class="post-info">
                <div class="post-name">
                    ${escapeHtml(post.displayName)}
                    ${post.username === '3tx' ? '<span class="vip-badge">VIP</span>' : ''}
                </div>
                <div class="post-username">@${escapeHtml(post.username)}</div>
            </div>
            <div class="post-time">${new Date(post.time).toLocaleTimeString('ar-IQ')}</div>
        </div>
        <div class="post-text">${escapeHtml(post.text)}</div>
        <div class="post-actions">
            <button class="like-btn">❤️ ${post.likes || 0}</button>
            ${isOwn ? '<button class="delete-btn">🗑️ حذف</button>' : ''}
        </div>
    `;
    div.querySelector('.like-btn').onclick = () => socket.emit('like-post', post.id);
    if (isOwn) div.querySelector('.delete-btn').onclick = () => socket.emit('delete-post', post.id);
    return div;
}

// ===== بناء بطاقة مستخدم =====
function buildUserCard(u) {
    const isFriend = currentUser.friends.includes(u.username);
    const hasRequest = currentUser.requests.includes(u.username);
    const av = getAvatar(u);
    const div = document.createElement('div');
    div.className = 'user-card';
    const avStyle = av.isImage ? `background-image: url('${av.value}'); background-size: cover; background-position: center;` : '';
    const avText = (!av.isAdmin && !av.isImage) ? escapeHtml(av.value) : '';
    div.innerHTML = `
        <div style="display: flex; align-items: center; gap: 10px; overflow: hidden;">
            <div class="user-card-avatar ${av.isAdmin ? 'admin-avatar' : ''}" style="${avStyle}">${avText}</div>
            <div style="overflow: hidden;">
                <div style="font-weight: bold; font-size: 14px;">
                    ${escapeHtml(u.displayName)}
                    ${isFriend ? '<span class="friend-badge">صديق</span>' : ''}
                    ${hasRequest ? '<span class="request-badge">طلب وارد</span>' : ''}
                </div>
                <small style="color: #b39ddb;">@${escapeHtml(u.username)}</small>
            </div>
        </div>
        <div class="action-btns">
            ${!isFriend && !hasRequest ? `<button class="add-friend">➕ إضافة</button>` : ''}
            ${hasRequest ? `<button class="accept" data-user="${u.username}">✅ قبول</button><button class="reject" data-user="${u.username}">❌ رفض</button>` : ''}
            ${isFriend ? `<button class="chat-btn" data-user="${u.username}">💬 دردشة</button>` : ''}
        </div>
    `;
    div.querySelector('.add-friend')?.addEventListener('click', () => socket.emit('add-friend', u.username));
    div.querySelector('.accept')?.addEventListener('click', () => socket.emit('accept-friend', u.username));
    div.querySelector('.reject')?.addEventListener('click', () => socket.emit('reject-friend', u.username));
    div.querySelector('.chat-btn')?.addEventListener('click', () => openChat(u.username, u.displayName, av));
    return div;
}

// ===== بدء التطبيق =====
function startApp(data) {
    currentUser = {
        username: data.username,
        displayName: data.displayName,
        avatar: data.avatar,
        avatarType: data.avatarType,
        isAdmin: data.isAdmin || false,
        friends: data.friends || [],
        requests: data.requests || []
    };

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-name').textContent = data.displayName;
    document.getElementById('user-username').textContent = `@${data.username}`;

    // صورة المستخدم في الهيدر
    const userAvatarEl = document.getElementById('user-avatar');
    applyAvatar(userAvatarEl, getAvatar(currentUser));

    // عرض المنشورات
    const postsContainer = document.getElementById('posts-list');
    postsContainer.innerHTML = '';
    [...data.posts].reverse().forEach(post => postsContainer.appendChild(buildPostCard(post)));

    // عرض المستخدمين
    const usersContainer = document.getElementById('users-list');
    usersContainer.innerHTML = '';
    const others = data.users.filter(u => u.username !== currentUser.username);
    if (others.length === 0) usersContainer.innerHTML = '<div class="empty">لا يوجد مستخدمون آخرون بعد</div>';
    else others.forEach(u => usersContainer.appendChild(buildUserCard(u)));

    // عرض الطلبات
    renderRequests();

    // عرض الدردشات
    renderChats(data.users);

    // ===== أحداث السيرفر =====

    socket.on('post-added', (post) => {
        document.getElementById('posts-list').prepend(buildPostCard(post));
    });

    socket.on('post-updated', (post) => {
        const el = document.querySelector(`.post-card[data-id="${post.id}"] .like-btn`);
        if (el) el.innerHTML = `❤️ ${post.likes}`;
    });

    socket.on('post-deleted', (id) => {
        document.querySelector(`.post-card[data-id="${id}"]`)?.remove();
    });

    socket.on('user-joined', (u) => {
        // مستخدم جديد سجّل - أضفه لقائمة المستخدمين
        const usersContainer = document.getElementById('users-list');
        if (usersContainer.querySelector('.empty')) usersContainer.innerHTML = '';
        usersContainer.appendChild(buildUserCard(u));
    });

    socket.on('new-request', (d) => {
        if (!currentUser.requests.includes(d.from)) currentUser.requests.push(d.from);
        renderRequests();
    });

    socket.on('request-accepted', (d) => {
        if (!currentUser.friends.includes(d.from)) currentUser.friends.push(d.from);
        currentUser.requests = currentUser.requests.filter(u => u !== d.from);
        renderRequests();
        // أضف لقائمة الدردشات
        const chatsContainer = document.getElementById('chats-list');
        if (chatsContainer.querySelector('.empty')) chatsContainer.innerHTML = '';
        // تحقق من أن البطاقة مش موجودة
        if (!chatsContainer.querySelector(`[data-friend="${d.from}"]`)) {
            const av = { isAdmin: d.from === '3tx', isImage: false, value: '👤' };
            const div = document.createElement('div');
            div.className = 'user-card';
            div.dataset.friend = d.from;
            div.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="user-card-avatar ${av.isAdmin ? 'admin-avatar' : ''}">${av.isAdmin ? '' : '👤'}</div>
                    <div>
                        <strong>${escapeHtml(d.fromName)}</strong><br>
                        <small style="color: #b39ddb;">@${escapeHtml(d.from)}</small>
                    </div>
                </div>
                <div><button class="chat-btn">💬 دردشة</button></div>
            `;
            div.querySelector('.chat-btn').onclick = () => openChat(d.from, d.fromName, av);
            chatsContainer.appendChild(div);
        }
        // حدّث بطاقة المستخدم في قائمة المستخدمين
        renderUsersFromCurrent();
    });

    socket.on('new-message', (d) => {
        const roomId = [currentUser.username, d.from].sort().join('-');
        if (!conversations[roomId]) conversations[roomId] = [];
        conversations[roomId].push({ from: d.from, message: d.message, time: d.time });
        saveConversations();
        if (currentChatWith === d.from) addMessageToChat(d.message, false, d.time);
    });

    socket.on('avatar-updated', (d) => {
        // تحديث صورة المستخدم في كل مكان
        if (d.username === currentUser.username) {
            currentUser.avatar = d.avatar;
            currentUser.avatarType = 'image';
            const el = document.getElementById('user-avatar');
            el.style.backgroundImage = `url('${d.avatar}')`;
            el.style.backgroundSize = 'cover';
            el.textContent = '';
            // تحديث نافذة التعديل
            document.getElementById('profile-avatar-large').style.backgroundImage = `url('${d.avatar}')`;
            document.getElementById('profile-avatar-large').style.backgroundSize = 'cover';
            document.getElementById('profile-avatar-large').textContent = '';
        }
    });

    socket.on('avatar-updated-success', () => {
        alert('✅ تم تحديث الصورة الشخصية بنجاح');
        closeProfileModal();
    });
}

function renderRequests() {
    const container = document.getElementById('requests-list');
    container.innerHTML = '';
    if (currentUser.requests.length === 0) {
        container.innerHTML = '<div class="empty">لا توجد طلبات صداقة</div>';
        return;
    }
    currentUser.requests.forEach(req => {
        const div = document.createElement('div');
        div.className = 'user-card';
        div.innerHTML = `
            <div><strong>${escapeHtml(req)}</strong><br><small style="color:#b39ddb;">@${escapeHtml(req)}</small></div>
            <div class="action-btns">
                <button class="accept">✅ قبول</button>
                <button class="reject">❌ رفض</button>
            </div>
        `;
        div.querySelector('.accept').onclick = () => socket.emit('accept-friend', req);
        div.querySelector('.reject').onclick = () => socket.emit('reject-friend', req);
        container.appendChild(div);
    });
}

function renderChats(allUsers) {
    const container = document.getElementById('chats-list');
    container.innerHTML = '';
    if (currentUser.friends.length === 0) {
        container.innerHTML = '<div class="empty">أضف أصدقاء لتبدأ الدردشة</div>';
        return;
    }
    currentUser.friends.forEach(f => {
        const uData = allUsers ? allUsers.find(u => u.username === f) : null;
        const av = uData ? getAvatar(uData) : { isAdmin: f === '3tx', isImage: false, value: '👤' };
        const displayName = uData ? uData.displayName : f;
        const div = document.createElement('div');
        div.className = 'user-card';
        div.dataset.friend = f;
        const avStyle = av.isImage ? `background-image: url('${av.value}'); background-size: cover;` : '';
        const avText = (!av.isAdmin && !av.isImage) ? escapeHtml(av.value) : '';
        div.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="user-card-avatar ${av.isAdmin ? 'admin-avatar' : ''}" style="${avStyle}">${avText}</div>
                <div>
                    <strong>${escapeHtml(displayName)}</strong><br>
                    <small style="color:#b39ddb;">@${escapeHtml(f)}</small>
                </div>
            </div>
            <div><button class="chat-btn">💬 دردشة</button></div>
        `;
        div.querySelector('.chat-btn').onclick = () => openChat(f, displayName, av);
        container.appendChild(div);
    });
}

function renderUsersFromCurrent() {
    // إعادة رسم قائمة المستخدمين بناءً على البيانات الحالية
    // (بسيط - فقط نحدث الأزرار)
    document.querySelectorAll('#users-list .user-card').forEach(card => {
        // إعادة رسم كاملة لكل بطاقة مستخدم مو ممكن بدون بيانات
        // المفروض يتحدث عند login-success لكن نتركه هيك
    });
}

// ===== الصورة الشخصية =====
function openProfileModal() {
    if (!currentUser) return;
    const largeAv = document.getElementById('profile-avatar-large');
    if (currentUser.isAdmin) {
        largeAv.style.backgroundImage = `url('https://g.top4top.io/p_37443983d0.gif')`;
        largeAv.style.backgroundSize = 'cover';
        largeAv.textContent = '';
    } else if (currentUser.avatarType === 'image') {
        largeAv.style.backgroundImage = `url('${currentUser.avatar}')`;
        largeAv.style.backgroundSize = 'cover';
        largeAv.textContent = '';
    } else {
        largeAv.style.backgroundImage = '';
        largeAv.textContent = currentUser.avatar || '👤';
    }
    document.getElementById('profile-modal').classList.add('active');
}
function closeProfileModal() {
    document.getElementById('profile-modal').classList.remove('active');
}

// ===== أحداث الواجهة =====
document.getElementById('upload-btn').onclick = () => {
    if (currentUser?.isAdmin) { alert('المشرف لا يمكنه تغيير صورته'); return; }
    document.getElementById('avatar-file').click();
};
document.getElementById('avatar-file').onchange = (e) => {
    const file = e.target.files[0];
    if (!file || !currentUser || currentUser.isAdmin) return;
    if (file.size > 2 * 1024 * 1024) { alert('الصورة كبيرة، اختر صورة أصغر من 2MB'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
        const imageData = ev.target.result;
        document.getElementById('profile-avatar-large').style.backgroundImage = `url('${imageData}')`;
        document.getElementById('profile-avatar-large').style.backgroundSize = 'cover';
        document.getElementById('profile-avatar-large').textContent = '';
        socket.emit('update-avatar', { avatar: imageData });
    };
    reader.readAsDataURL(file);
    e.target.value = '';
};

document.getElementById('login-btn').onclick = () => {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value.trim();
    const displayName = document.getElementById('displayname').value.trim();
    const err = document.getElementById('error-msg');
    err.textContent = '';

    if (!username || !password) { err.textContent = 'يرجى ملء اسم المستخدم وكلمة السر'; return; }
    if (!/^[a-z0-9_]+$/.test(username)) { err.textContent = 'اسم المستخدم: حروف إنجليزية وأرقام فقط'; return; }

    if (socket) socket.disconnect();
    socket = io();

    socket.on('connect', () => {
        socket.emit('login', { username, password, displayName: displayName || username });
    });
    socket.on('login-success', startApp);
    socket.on('login-error', (m) => { err.textContent = m; });
    socket.on('connect_error', () => { err.textContent = 'تعذر الاتصال بالسيرفر'; });
};

document.getElementById('logout-btn').onclick = () => {
    if (socket) socket.disconnect();
    location.reload();
};

document.getElementById('post-btn').onclick = () => {
    const text = document.getElementById('post-text').value.trim();
    if (!text || !socket) return;
    socket.emit('new-post', { text });
    document.getElementById('post-text').value = '';
};

document.getElementById('chat-back').onclick = () => {
    document.getElementById('chat-window').style.display = 'none';
    document.querySelector('.main-content').style.display = 'block';
    document.querySelector('.tabs').style.display = 'flex';
    currentChatWith = null;
};

document.getElementById('send-msg').onclick = sendMessage;
document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
});

document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.dataset.tab);
});

document.getElementById('user-avatar').onclick = openProfileModal;
document.getElementById('close-modal').onclick = closeProfileModal;
</script>
