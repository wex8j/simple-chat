<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>دردشة بغداد لايف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* خلفية البحر - الصورة اللي اخترتها */
        body {
            background-image: url('https://i.ibb.co/ymNqjks9/ec86b3a3baac247dab33322fcbc60384.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* طبقة شفافة عشان النص يبان */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        /* حاوية الدردشة */
        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* الهيدر */
        .chat-header {
            background: linear-gradient(135deg, rgba(206,17,38,0.9) 0%, rgba(0,122,61,0.9) 100%);
            backdrop-filter: blur(10px);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* الشعار المتحرك */
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo-flag {
            font-size: 28px;
            animation: wave 2s ease infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .logo-text h3 {
            color: white;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 10px;
            margin-top: 2px;
        }

        .online-users {
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 10px;
            color: white;
            margin-top: 8px;
        }

        /* منطقة الرسائل */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        /* الرسائل */
        .message {
            animation: fadeInUp 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message .display-name {
            font-size: 12px;
            font-weight: 600;
            color: #ffaaaa;
            margin-bottom: 3px;
        }

        .message .username {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2px;
        }

        .message-bubble {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            max-width: 100%;
            word-wrap: break-word;
            word-break: break-word;
            white-space: normal;
            color: white;
            font-size: 15px;
            line-height: 1.4;
        }

        .message .time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        /* الرسائل النظامية */
        .system-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 11px;
            margin: 6px 0;
            background: rgba(0, 0, 0, 0.5);
            align-self: center;
            padding: 4px 12px;
            border-radius: 50px;
        }

        /* منطقة الإدخال */
        .input-area {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .input-area input:focus {
            background: rgba(255, 255, 255, 0.22);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .input-area button:active {
            transform: scale(0.96);
        }

        /* شاشة تسجيل الدخول */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .welcome-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px 25px;
            text-align: center;
            max-width: 330px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .welcome-card h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome-card h1 span {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
            font-size: 13px;
        }

        .welcome-card input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            text-align: center;
            outline: none;
            margin-bottom: 12px;
        }

        .welcome-card input:focus {
            border-color: #CE1126;
        }

        .welcome-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .flag-decoration {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .saved-info {
            margin-top: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .saved-info button {
            background: transparent;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 11px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- الدردشة -->
    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-header">
            <div class="logo-area">
                <div class="logo-flag">🇮🇶</div>
                <div class="logo-text">
                    <h3>دردشة بغداد لايف</h3>
                    <p>Baghdad Live Chat</p>
                </div>
                <div class="logo-flag">🇮🇶</div>
            </div>
            <div class="online-users">🟢 <span id="users-count">0</span> متصل</div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="system-message">✨ مرحباً بك في دردشة بغداد لايف</div>
            <div class="system-message">🇮🇶 تواصل مع الناس من كل العراق 🇮🇶</div>
        </div>
        <div class="input-area">
            <input type="text" id="message" placeholder="اكتب رسالة..." maxlength="500">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-card">
            <div class="flag-decoration">🇮🇶</div>
            <h1>دردشة <span>بغداد لايف</span></h1>
            <p>سجل دخولك وابدأ المحادثة</p>
            
            <input type="text" id="login-username" placeholder="يوزر نيم" maxlength="20" dir="ltr">
            <input type="text" id="login-displayname" placeholder="الاسم الظاهر" maxlength="20">
            
            <button id="login-btn">دخول</button>
            
            <div class="error-msg" id="error-msg"></div>
            
            <div class="saved-info" id="saved-info" style="display: none;">
                <div id="saved-text"></div>
                <button id="use-saved-btn">استخدم الحساب المحفوظ</button>
                <button id="logout-saved-btn" style="background: rgba(206,17,38,0.5);">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');
        const loginUsername = document.getElementById('login-username');
        const loginDisplayname = document.getElementById('login-displayname');
        const loginBtn = document.getElementById('login-btn');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const usersCountSpan = document.getElementById('users-count');
        const errorMsg = document.getElementById('error-msg');
        const savedInfo = document.getElementById('saved-info');
        const savedText = document.getElementById('saved-text');
        const useSavedBtn = document.getElementById('use-saved-btn');
        const logoutSavedBtn = document.getElementById('logout-saved-btn');
        
        function saveUser(username, displayName) {
            localStorage.setItem('chat_user', JSON.stringify({ username, displayName }));
        }
        
        function logoutUser() {
            localStorage.removeItem('chat_user');
            savedInfo.style.display = 'none';
            loginUsername.value = '';
            loginDisplayname.value = '';
        }
        
        function loadSavedUser() {
            const saved = localStorage.getItem('chat_user');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (user.username && user.displayName) {
                        savedText.innerHTML = `👤 مرحباً ${user.displayName} (${user.username})`;
                        savedInfo.style.display = 'block';
                        return user;
                    }
                } catch(e) {}
            }
            return null;
        }
        
        function startChat(username, displayName) {
            currentUser = { username, displayName };
            saveUser(username, displayName);
            socket.emit('set-user', { username, displayName });
            welcomeScreen.style.display = 'none';
            chatContainer.style.display = 'flex';
            addSystemMessage('✨ أهلاً بك ' + displayName);
            messageInput.focus();
        }
        
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addChatMessage(data) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="display-name">${escapeHtml(data.displayName)}</div>
                <div class="username">@${escapeHtml(data.username)}</div>
                <div class="message-bubble">${escapeHtml(data.message)}</div>
                <div class="time">${data.time}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function isValidUsername(username) {
            return username.length >= 3 && /^[a-zA-Z0-9_]+$/.test(username);
        }
        
        loginBtn.onclick = function() {
            const username = loginUsername.value.trim().toLowerCase();
            const displayName = loginDisplayname.value.trim();
            errorMsg.style.display = 'none';
            
            if (username === '') {
                errorMsg.textContent = 'الرجاء إدخال يوزر نيم';
                errorMsg.style.display = 'block';
                return;
            }
            if (!isValidUsername(username)) {
                errorMsg.textContent = 'اليوزر نيم: حروف وأرقام فقط (3 أحرف فأكثر)';
                errorMsg.style.display = 'block';
                return;
            }
            if (displayName === '') {
                errorMsg.textContent = 'الرجاء إدخال الاسم الظاهر';
                errorMsg.style.display = 'block';
                return;
            }
            startChat(username, displayName);
        };
        
        useSavedBtn.onclick = function() {
            const saved = loadSavedUser();
            if (saved) startChat(saved.username, saved.displayName);
        };
        
        logoutSavedBtn.onclick = function() {
            logoutUser();
        };
        
        sendBtn.onclick = function() {
            const msg = messageInput.value.trim();
            if (msg !== '' && currentUser) {
                socket.emit('send-message', { 
                    message: msg,
                    username: currentUser.username,
                    displayName: currentUser.displayName
                });
                messageInput.value = '';
                messageInput.focus();
            }
        };
        
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendBtn.click();
        };
        
        loginUsername.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        loginDisplayname.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        socket.on('receive-message', function(data) {
            addChatMessage(data);
        });
        
        socket.on('user-joined', function(data) {
            addSystemMessage(`✨ ${data.displayName} دخل الدردشة`);
        });
        
        socket.on('user-left', function(data) {
            addSystemMessage(`👋 ${data.displayName} غادر`);
        });
        
        socket.on('users-list', function(users) {
            usersCountSpan.textContent = users.length;
        });
        
        socket.on('username-taken', function() {
            errorMsg.textContent = 'هذا اليوزر نيم مستخدم من قبل!';
            errorMsg.style.display = 'block';
        });
        
        loadSavedUser();
    </script>
</body>
</html>
