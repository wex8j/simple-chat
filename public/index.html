<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>بغداد لايف | اجتماعي</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <div class="logo">
                <h2>🇮🇶 بغداد لايف</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-page="home">
                    <span>🏠</span> الرئيسية
                </button>
                <button class="nav-btn" data-page="chat">
                    <span>💬</span> المحادثات
                </button>
                <button class="nav-btn" data-page="profile">
                    <span>👤</span> ملفي
                </button>
            </nav>
            <div class="user-info" id="user-info">
                <div class="user-avatar" id="user-avatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="user-name">...</div>
                    <div class="user-username" id="user-username">@...</div>
                </div>
                <button class="logout-btn" id="logout-btn">🚪</button>
            </div>
        </aside>

        <!-- الصفحة الرئيسية (منشورات) -->
        <main class="main-content" id="home-page">
            <div class="create-post">
                <textarea id="post-text" placeholder="شارك شي مع الجميع..." rows="3"></textarea>
                <div class="post-actions">
                    <button class="post-btn" id="post-btn">نشر</button>
                </div>
            </div>
            <div class="posts-feed" id="posts-feed">
                <div class="loading">جاري التحميل...</div>
            </div>
        </main>

        <!-- صفحة الدردشة -->
        <main class="main-content" id="chat-page" style="display: none;">
            <div class="chat-container">
                <div class="conversations-list" id="conversations-list">
                    <div class="empty-state">لا توجد محادثات بعد</div>
                </div>
                <div class="chat-area" id="chat-area" style="display: none;">
                    <div class="chat-header">
                        <button class="back-chat-btn" id="back-chat-btn">←</button>
                        <span id="chat-partner-name"></span>
                        <button class="block-chat-btn" id="block-chat-btn">🚫 حظر</button>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="اكتب رسالة...">
                        <button id="send-chat-btn">إرسال</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- صفحة الملف الشخصي -->
        <main class="main-content" id="profile-page" style="display: none;">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar" id="profile-avatar">👤</div>
                    <div class="profile-info">
                        <h2 id="profile-name">...</h2>
                        <p id="profile-username">@...</p>
                    </div>
                </div>
                <div class="profile-tabs">
                    <button class="tab-btn active" data-tab="posts">منشوراتي</button>
                    <button class="tab-btn" data-tab="blocked">المحظورون</button>
                </div>
                <div class="tab-content active" id="posts-tab">
                    <div class="my-posts" id="my-posts"></div>
                </div>
                <div class="tab-content" id="blocked-tab">
                    <div class="blocked-list" id="blocked-list"></div>
                </div>
            </div>
        </main>

        <!-- قائمة المستخدمين الجانبية -->
        <aside class="users-sidebar">
            <h3>المستخدمين</h3>
            <div class="users-list" id="users-list">
                <div class="loading">جاري التحميل...</div>
            </div>
        </aside>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <div class="flag-decoration">🇮🇶</div>
            <h2>بغداد لايف</h2>
            <p>سجل دخولك للتواصل مع الآخرين</p>
            <input type="text" id="login-username" placeholder="يوزر نيم" maxlength="20">
            <input type="text" id="login-displayname" placeholder="الاسم الظاهر" maxlength="20">
            <button id="login-btn">دخول</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js"></script>
</body>
</html>
