<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بغداد لايف</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; }
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box {
            background: rgba(0,0,0,0.7); padding: 40px; border-radius: 30px; width: 350px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 30px; background: rgba(255,255,255,0.1); color: white; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 12px; margin-top: 10px; background: linear-gradient(135deg, #CE1126, #007A3D); border: none; border-radius: 30px; color: white; font-weight: bold; cursor: pointer;
        }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #0f0f1a; padding: 20px; border-left: 1px solid #333; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .users-panel { width: 250px; background: #0f0f1a; padding: 20px; border-right: 1px solid #333; overflow-y: auto; }
        .user-card {
            background: #1e1e2e; padding: 12px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .friend-badge { background: #4caf50; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .request-badge { background: #ff9800; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .btn-sm {
            background: linear-gradient(135deg, #CE1126, #007A3D); border: none; padding: 5px 12px;
            border-radius: 20px; color: white; cursor: pointer; font-size: 12px;
        }
        .accept { background: #4caf50; }
        .reject { background: #f44336; }
        .chat { background: #2196f3; }
        .create-post {
            background: #1e1e2e; padding: 20px; border-radius: 20px; margin-bottom: 20px;
        }
        .create-post textarea {
            width: 100%; background: #2a2a3a; border: none; border-radius: 15px; padding: 12px; color: white; resize: none;
        }
        .post-btn {
            margin-top: 10px; background: linear-gradient(135deg, #CE1126, #007A3D); border: none; padding: 8px 25px; border-radius: 25px; color: white; cursor: pointer;
        }
        .post-card {
            background: #1e1e2e; padding: 20px; border-radius: 20px; margin-bottom: 15px;
        }
        .chat-area {
            display: none; flex-direction: column; height: 100%; background: #1e1e2e; border-radius: 20px;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; }
        .message.own { text-align: left; }
        .bubble {
            display: inline-block; background: #2a2a3a; padding: 10px 15px; border-radius: 20px; max-width: 80%;
        }
        .message.own .bubble { background: linear-gradient(135deg, #CE1126, #007A3D); }
        .chat-input { padding: 15px; display: flex; gap: 10px; background: #0f0f1a; }
        .chat-input input { flex: 1; padding: 12px; background: #2a2a3a; border: none; border-radius: 30px; color: white; }
        .chat-input button { background: linear-gradient(135deg, #CE1126, #007A3D); border: none; padding: 12px 25px; border-radius: 30px; color: white; cursor: pointer; }
        .nav-btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: none; border: none;
            color: white; text-align: right; cursor: pointer; border-radius: 10px;
        }
        .nav-btn.active { background: linear-gradient(135deg, #CE1126, #007A3D); }
        .user-info { margin-top: 40px; padding-top: 20px; border-top: 1px solid #333; display: flex; gap: 10px; align-items: center; }
        .system-msg { text-align: center; color: #888; font-size: 12px; margin: 10px 0; }
        .empty { text-align: center; color: #888; padding: 30px; }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h2>🇮🇶 بغداد لايف</h2>
        <p>سجل دخولك</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="displayname" placeholder="الاسم الظاهر (للتسجيل)">
        <button id="login-btn">دخول / تسجيل</button>
        <div id="error-msg" style="color:#ff6b6b; margin-top:10px;"></div>
    </div>
</div>

<div class="app" id="app" style="display: none;">
    <div class="sidebar">
        <h3 style="text-align:center;">🇮🇶 بغداد لايف</h3>
        <button class="nav-btn active" data-page="home">🏠 الرئيسية</button>
        <button class="nav-btn" data-page="chat">💬 المحادثات</button>
        <div class="user-info">
            <div style="width:40px;height:40px;background:#333;border-radius:50%;display:flex;align-items:center;justify-content:center;">👤</div>
            <div><div id="user-name"></div><div id="user-username" style="font-size:11px;color:#888;"></div></div>
            <button id="logout-btn" style="background:none;border:none;font-size:20px;cursor:pointer;">🚪</button>
        </div>
    </div>
    <div class="main">
        <div id="home-page">
            <div class="create-post">
                <textarea id="post-text" placeholder="شارك ما في خاطرك..." rows="3"></textarea>
                <button class="post-btn" id="post-btn">نشر</button>
            </div>
            <div id="posts-feed"></div>
        </div>
        <div id="chat-page" style="display: none;">
            <div id="conversations-list"></div>
            <div class="chat-area" id="chat-area">
                <div style="padding:15px;border-bottom:1px solid #333;">
                    <button id="back-btn" style="background:none;border:none;color:white;font-size:20px;">←</button>
                    <span id="chat-with-name"></span>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="اكتب رسالة...">
                    <button id="send-msg-btn">إرسال</button>
                </div>
            </div>
        </div>
    </div>
    <div class="users-panel">
        <h3>👥 المستخدمون</h3>
        <div id="users-list"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket, currentUser, currentChatWith;
let conversations = JSON.parse(localStorage.getItem('chats') || '{}');

function escape(t) { let d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function addSysMsg(msg, container='chat-messages') {
    let c = document.getElementById(container);
    if(c) { let d=document.createElement('div'); d.className='system-msg'; d.textContent=msg; c.appendChild(d); c.scrollTop=c.scrollHeight; }
}

function addMsg(msg, isOwn, time, container='chat-messages') {
    let c = document.getElementById(container);
    if(!c) return;
    let d = document.createElement('div');
    d.className = 'message ' + (isOwn ? 'own' : '');
    d.innerHTML = `<div class="bubble">${escape(msg)}</div><div style="font-size:10px;color:#888;">${time||''}</div>`;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
}

function updateUsers(users) {
    let container = document.getElementById('users-list');
    if(!container || !currentUser) return;
    container.innerHTML = '';
    users.forEach(u => {
        if(u.username === currentUser.username) return;
        let isFriend = currentUser.friends.includes(u.username);
        let hasRequest = currentUser.requests.includes(u.username);
        let div = document.createElement('div');
        div.className = 'user-card';
        div.innerHTML = `
            <div>
                <strong>${escape(u.displayName)}</strong><br>
                <small>@${escape(u.username)}</small>
                ${isFriend ? '<span class="friend-badge">صديق</span>' : ''}
                ${hasRequest ? '<span class="request-badge">طلب وارد</span>' : ''}
            </div>
            <div>
                ${!isFriend && !hasRequest ? `<button class="btn-sm add-friend" data-user="${u.username}">➕ إضافة</button>` : ''}
                ${hasRequest ? `<button class="btn-sm accept" data-user="${u.username}">✅ قبول</button> <button class="btn-sm reject" data-user="${u.username}">❌ رفض</button>` : ''}
                ${isFriend ? `<button class="btn-sm chat" data-user="${u.username}">💬 دردشة</button>` : ''}
            </div>
        `;
        div.querySelectorAll('button').forEach(btn => {
            btn.onclick = () => {
                let user = btn.dataset.user;
                if(btn.classList.contains('add-friend')) socket.emit('add-friend', user);
                else if(btn.classList.contains('accept')) socket.emit('accept-friend', user);
                else if(btn.classList.contains('reject')) socket.emit('reject-friend', user);
                else if(btn.classList.contains('chat')) openChat(user);
            };
        });
        container.appendChild(div);
    });
}

function openChat(username) {
    if(!currentUser.friends.includes(username)) { addSysMsg('❌ يجب أن تكون صديقاً أولاً'); return; }
    currentChatWith = username;
    document.getElementById('conversations-list').style.display = 'none';
    document.getElementById('chat-area').style.display = 'flex';
    document.getElementById('chat-with-name').textContent = username;
    document.getElementById('chat-messages').innerHTML = '';
    let roomId = [currentUser.username, username].sort().join('-');
    let msgs = conversations[roomId] || [];
    msgs.forEach(m => addMsg(m.message, m.from === currentUser.username, m.time));
}

function sendMessage() {
    let input = document.getElementById('chat-input');
    let msg = input.value.trim();
    if(!msg || !currentChatWith) return;
    socket.emit('send-message', { to: currentChatWith, message: msg });
    let roomId = [currentUser.username, currentChatWith].sort().join('-');
    if(!conversations[roomId]) conversations[roomId] = [];
    conversations[roomId].push({ from: currentUser.username, message: msg, time: new Date().toLocaleTimeString() });
    localStorage.setItem('chats', JSON.stringify(conversations));
    addMsg(msg, true, new Date().toLocaleTimeString());
    input.value = '';
}

function loadConversations() {
    let container = document.getElementById('conversations-list');
    let rooms = Object.keys(conversations);
    if(rooms.length === 0) { container.innerHTML = '<div class="empty">لا توجد محادثات</div>'; return; }
    container.innerHTML = '';
    rooms.forEach(room => {
        let other = room.split('-').find(u => u !== currentUser.username);
        let last = conversations[room][conversations[room].length-1];
        let div = document.createElement('div');
        div.style.cssText = 'background:#2a2a3a;padding:12px;border-radius:12px;margin-bottom:8px;cursor:pointer;';
        div.innerHTML = `<strong>${escape(other)}</strong><div style="font-size:11px;color:#888;">${last ? last.message.substring(0,30) : 'ابدأ المحادثة'}</div>`;
        div.onclick = () => openChat(other);
        container.appendChild(div);
    });
}

function addPost(post) {
    let container = document.getElementById('posts-feed');
    let isOwn = post.username === currentUser.username;
    let div = document.createElement('div');
    div.className = 'post-card';
    div.dataset.id = post.id;
    div.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
            <div><strong>${escape(post.displayName)}</strong> <small>@${escape(post.username)}</small></div>
            <div style="font-size:11px;color:#888;">${new Date(post.time).toLocaleTimeString()}</div>
        </div>
        <div style="margin-bottom:10px;">${escape(post.text)}</div>
        <button class="btn-sm like-btn">❤️ ${post.likes||0}</button>
        ${isOwn ? `<button class="btn-sm delete-btn" style="background:#f44336;margin-left:10px;">🗑️ حذف</button>` : ''}
    `;
    div.querySelector('.like-btn').onclick = () => socket.emit('like-post', post.id);
    if(isOwn) div.querySelector('.delete-btn').onclick = () => socket.emit('delete-post', post.id);
    container.prepend(div);
}

function loadPosts(posts) {
    let c = document.getElementById('posts-feed');
    c.innerHTML = '';
    [...posts].reverse().forEach(p => addPost(p));
}

function switchPage(page) {
    document.getElementById('home-page').style.display = page === 'home' ? 'block' : 'none';
    document.getElementById('chat-page').style.display = page === 'chat' ? 'block' : 'none';
    if(page === 'chat') loadConversations();
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.nav-btn[data-page="${page}"]`).classList.add('active');
}

function startApp(data) {
    currentUser = {
        username: data.username,
        displayName: data.displayName,
        friends: data.friends || [],
        requests: data.requests || []
    };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-name').textContent = data.displayName;
    document.getElementById('user-username').textContent = `@${data.username}`;
    updateUsers(data.users);
    loadPosts(data.posts);
    switchPage('home');
    
    socket.on('new-request', (d) => {
        currentUser.requests.push(d.from);
        updateUsers(data.users);
        addSysMsg(`📩 طلب صداقة من ${d.fromName}`, 'chat-messages');
    });
    socket.on('friend-accepted', (d) => {
        if(!currentUser.friends.includes(d.from)) currentUser.friends.push(d.from);
        currentUser.requests = currentUser.requests.filter(u => u !== d.from);
        updateUsers(data.users);
        addSysMsg(`🎉 ${d.fromName} قبل طلب الصداقة!`, 'chat-messages');
        loadConversations();
    });
    socket.on('new-message', (d) => {
        let roomId = [currentUser.username, d.from].sort().join('-');
        if(!conversations[roomId]) conversations[roomId] = [];
        conversations[roomId].push({ from: d.from, message: d.message, time: d.time });
        localStorage.setItem('chats', JSON.stringify(conversations));
        if(currentChatWith === d.from) addMsg(d.message, false, d.time);
        else loadConversations();
    });
    socket.on('post-added', (p) => addPost(p));
    socket.on('post-updated', (p) => {
        let el = document.querySelector(`.post-card[data-id="${p.id}"]`);
        if(el) el.querySelector('.like-btn').innerHTML = `❤️ ${p.likes}`;
    });
    socket.on('post-deleted', (id) => document.querySelector(`.post-card[data-id="${id}"]`)?.remove());
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('login-btn').onclick = () => {
        let user = document.getElementById('username').value.trim().toLowerCase();
        let pass = document.getElementById('password').value.trim();
        let name = document.getElementById('displayname').value.trim();
        let err = document.getElementById('error-msg');
        if(!user || !pass) { err.textContent = 'املأ الحقول'; return; }
        socket = io();
        socket.on('connect', () => socket.emit('login', { username: user, password: pass, displayName: name || user }));
        socket.on('login-success', startApp);
        socket.on('login-error', (m) => err.textContent = m);
    };
    document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('chats'); location.reload(); };
    document.getElementById('post-btn').onclick = () => {
        let t = document.getElementById('post-text').value.trim();
        if(t && socket) socket.emit('new-post', { text: t });
        document.getElementById('post-text').value = '';
    };
    document.getElementById('back-btn').onclick = () => {
        document.getElementById('chat-area').style.display = 'none';
        document.getElementById('conversations-list').style.display = 'block';
        currentChatWith = null;
    };
    document.getElementById('send-msg-btn').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => switchPage(b.dataset.page));
});
</script>
</body>
</html>
