<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>دردشة بغداد لايف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://i.ibb.co/ymNqjks9/ec86b3a3baac247dab33322fcbc60384.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        /* حاوية الدردشة */
        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* الهيدر مع زر القائمة */
        .chat-header {
            background: linear-gradient(135deg, rgba(206,17,38,0.9) 0%, rgba(0,122,61,0.9) 100%);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: white;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .menu-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .logo-area {
            text-align: center;
            flex: 1;
        }

        .logo-area h3 {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .logo-area p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 10px;
        }

        .online-users {
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 12px;
            color: white;
        }

        /* قائمة الأعضاء الجانبية */
        .members-sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .members-sidebar.open {
            right: 0;
        }

        .members-header {
            padding: 20px 16px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .members-header h4 {
            color: white;
            font-size: 18px;
        }

        .close-menu {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .member-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
        }

        .member-info {
            flex: 1;
        }

        .member-display {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .member-username {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .admin-badge {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }

        .muted-badge {
            background: #ff9800;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 20px;
            color: white;
            margin-left: 6px;
        }

        .member-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .admin-btn {
            background: rgba(100, 100, 100, 0.6);
            border: none;
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .admin-btn.kick {
            background: rgba(255, 100, 100, 0.7);
        }

        .admin-btn.ban {
            background: rgba(50, 50, 50, 0.8);
        }

        .admin-btn.mute {
            background: rgba(255, 150, 0, 0.7);
        }

        /* الخلفية المظلمة عند فتح القائمة */
        .overlay-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .overlay-menu.active {
            display: block;
        }

        /* باقي الدردشة */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            animation: fadeInUp 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message .display-name {
            font-size: 12px;
            font-weight: 600;
            color: #ffaaaa;
            margin-bottom: 3px;
        }

        .message .username {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2px;
        }

        .message-bubble {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            max-width: 100%;
            word-wrap: break-word;
            color: white;
            font-size: 15px;
            line-height: 1.4;
        }

        .message-bubble.muted {
            opacity: 0.5;
            font-style: italic;
        }

        .message .time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        .system-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 11px;
            margin: 6px 0;
            background: rgba(0, 0, 0, 0.5);
            align-self: center;
            padding: 4px 12px;
            border-radius: 50px;
        }

        .input-area {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .input-area input:focus {
            background: rgba(255, 255, 255, 0.22);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        /* شاشة تسجيل الدخول */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .welcome-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px 25px;
            text-align: center;
            max-width: 330px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .welcome-card h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome-card h1 span {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            text-align: center;
            outline: none;
            margin-bottom: 12px;
        }

        .welcome-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .flag-decoration {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .saved-info {
            margin-top: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .saved-info button {
            background: transparent;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 11px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-header">
            <button class="menu-btn" id="menu-btn">☰</button>
            <div class="logo-area">
                <h3>دردشة بغداد لايف</h3>
                <p>Baghdad Live Chat</p>
            </div>
            <div class="online-users">🟢 <span id="users-count">0</span></div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="system-message">✨ مرحباً بك في دردشة بغداد لايف</div>
        </div>
        <div class="input-area">
            <input type="text" id="message" placeholder="اكتب رسالة..." maxlength="500" autocomplete="off">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <!-- قائمة الأعضاء -->
    <div class="overlay-menu" id="overlay-menu"></div>
    <div class="members-sidebar" id="members-sidebar">
        <div class="members-header">
            <h4>👥 الأعضاء</h4>
            <button class="close-menu" id="close-menu">✕</button>
        </div>
        <div class="members-list" id="members-list">
            <div class="system-message">جاري التحميل...</div>
        </div>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-card">
            <div class="flag-decoration">🇮🇶</div>
            <h1>دردشة <span>بغداد لايف</span></h1>
            <p>سجل دخولك وابدأ المحادثة</p>
            
            <input type="text" id="login-username" placeholder="يوزر نيم" maxlength="20" dir="ltr">
            <input type="text" id="login-displayname" placeholder="الاسم الظاهر" maxlength="20">
            
            <button id="login-btn">دخول</button>
            
            <div class="error-msg" id="error-msg"></div>
            
            <div class="saved-info" id="saved-info" style="display: none;">
                <div id="saved-text"></div>
                <button id="use-saved-btn">استخدم الحساب المحفوظ</button>
                <button id="logout-saved-btn" style="background: rgba(206,17,38,0.5);">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let bannedUsers = JSON.parse(localStorage.getItem('banned_users') || '[]');
        let mutedUsers = []; // قائمة المكتمين
        
        const ADMIN_USERNAME = "3tx";
        
        // العناصر
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');
        const membersSidebar = document.getElementById('members-sidebar');
        const membersList = document.getElementById('members-list');
        const menuBtn = document.getElementById('menu-btn');
        const closeMenu = document.getElementById('close-menu');
        const overlayMenu = document.getElementById('overlay-menu');
        const loginUsername = document.getElementById('login-username');
        const loginDisplayname = document.getElementById('login-displayname');
        const loginBtn = document.getElementById('login-btn');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const usersCountSpan = document.getElementById('users-count');
        const errorMsg = document.getElementById('error-msg');
        const savedInfo = document.getElementById('saved-info');
        const savedText = document.getElementById('saved-text');
        const useSavedBtn = document.getElementById('use-saved-btn');
        const logoutSavedBtn = document.getElementById('logout-saved-btn');
        
        // فتح/إغلاق القائمة
        function openMenu() {
            membersSidebar.classList.add('open');
            overlayMenu.classList.add('active');
        }
        
        function closeMenuFunc() {
            membersSidebar.classList.remove('open');
            overlayMenu.classList.remove('active');
        }
        
        menuBtn.onclick = openMenu;
        closeMenu.onclick = closeMenuFunc;
        overlayMenu.onclick = closeMenuFunc;
        
        function saveUser(username, displayName) {
            localStorage.setItem('chat_user', JSON.stringify({ username, displayName }));
        }
        
        function logoutUser() {
            localStorage.removeItem('chat_user');
            savedInfo.style.display = 'none';
        }
        
        function loadSavedUser() {
            const saved = localStorage.getItem('chat_user');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (user.username && user.displayName && !bannedUsers.includes(user.username)) {
                        savedText.innerHTML = `👤 ${user.displayName} (@${user.username})`;
                        savedInfo.style.display = 'block';
                        return user;
                    }
                } catch(e) {}
            }
            return null;
        }
        
        function updateMembersList(users) {
            if (!membersList) return;
            
            membersList.innerHTML = '';
            if (users.length === 0) {
                membersList.innerHTML = '<div class="system-message">لا يوجد أعضاء</div>';
                return;
            }
            
            users.forEach(user => {
                const isAdmin = (user.username === ADMIN_USERNAME);
                const isMuted = mutedUsers.includes(user.username);
                const isCurrentUser = (currentUser && user.username === currentUser.username);
                const canModerate = currentUser && currentUser.username === ADMIN_USERNAME && !isCurrentUser;
                
                const memberDiv = document.createElement('div');
                memberDiv.className = 'member-item';
                memberDiv.innerHTML = `
                    <div class="member-info">
                        <div class="member-display">
                            ${escapeHtml(user.displayName)}
                            ${isAdmin ? '<span class="admin-badge">👑</span>' : ''}
                            ${isMuted ? '<span class="muted-badge">🔇 مكتوم</span>' : ''}
                        </div>
                        <div class="member-username">@${escapeHtml(user.username)}</div>
                    </div>
                    ${canModerate ? `
                        <div class="member-actions">
                            <button class="admin-btn kick" data-username="${user.username}" data-display="${user.displayName}">طرد</button>
                            <button class="admin-btn mute" data-username="${user.username}" data-display="${user.displayName}">${isMuted ? 'فك كتم' : 'كتم'}</button>
                            <button class="admin-btn ban" data-username="${user.username}" data-display="${user.displayName}">حظر</button>
                        </div>
                    ` : ''}
                `;
                membersList.appendChild(memberDiv);
            });
            
            // أزرار الطرد
            document.querySelectorAll('.admin-btn.kick').forEach(btn => {
                btn.onclick = () => kickUser(btn.dataset.username, btn.dataset.display);
            });
            // أزرار الكتم
            document.querySelectorAll('.admin-btn.mute').forEach(btn => {
                btn.onclick = () => toggleMute(btn.dataset.username, btn.dataset.display);
            });
            // أزرار الحظر
            document.querySelectorAll('.admin-btn.ban').forEach(btn => {
                btn.onclick = () => banUser(btn.dataset.username, btn.dataset.display);
            });
        }
        
        function kickUser(username, displayName) {
            if (currentUser && currentUser.username === ADMIN_USERNAME) {
                socket.emit('kick-user', { username, displayName });
                addSystemMessage(`⚠️ ${displayName} (@${username}) تم طرده بواسطة المشرف`);
            }
        }
        
        function toggleMute(username, displayName) {
            if (currentUser && currentUser.username === ADMIN_USERNAME) {
                if (mutedUsers.includes(username)) {
                    mutedUsers = mutedUsers.filter(u => u !== username);
                    addSystemMessage(`🔊 تم فك الكتم عن ${displayName} (@${username})`);
                } else {
                    mutedUsers.push(username);
                    addSystemMessage(`🔇 ${displayName} (@${username}) تم كتمه بواسطة المشرف`);
                }
                socket.emit('mute-user', { username, muted: mutedUsers.includes(username) });
            }
        }
        
        function banUser(username, displayName) {
            if (currentUser && currentUser.username === ADMIN_USERNAME) {
                if (!bannedUsers.includes(username)) {
                    bannedUsers.push(username);
                    localStorage.setItem('banned_users', JSON.stringify(bannedUsers));
                    socket.emit('ban-user', { username, displayName });
                    addSystemMessage(`🚫 ${displayName} (@${username}) تم حظره من الدردشة`);
                }
            }
        }
        
        function startChat(username, displayName) {
            if (bannedUsers.includes(username)) {
                errorMsg.textContent = '⛔ حسابك محظور من الدردشة!';
                errorMsg.style.display = 'block';
                return;
            }
            
            currentUser = { username, displayName };
            saveUser(username, displayName);
            socket.emit('set-user', { username, displayName, isAdmin: username === ADMIN_USERNAME });
            welcomeScreen.style.display = 'none';
            chatContainer.style.display = 'flex';
            addSystemMessage('✨ أهلاً بك ' + displayName + (username === ADMIN_USERNAME ? ' (المشرف)' : ''));
            messageInput.focus();
        }
        
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addChatMessage(data) {
            const isMuted = mutedUsers.includes(data.username);
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="display-name">${escapeHtml(data.displayName)}${data.isAdmin ? ' 👑' : ''}</div>
                <div class="username">@${escapeHtml(data.username)}</div>
                <div class="message-bubble ${isMuted ? 'muted' : ''}">${isMuted ? '[مكتوم] ' : ''}${escapeHtml(data.message)}</div>
                <div class="time">${data.time}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function isValidUsername(username) {
            return username.length >= 3 && /^[a-zA-Z0-9_]+$/.test(username);
        }
        
        loginBtn.onclick = function() {
            const username = loginUsername.value.trim().toLowerCase();
            const displayName = loginDisplayname.value.trim();
            errorMsg.style.display = 'none';
            
            if (!username) {
                errorMsg.textContent = 'الرجاء إدخال يوزر نيم';
                errorMsg.style.display = 'block';
                return;
            }
            if (!isValidUsername(username)) {
                errorMsg.textContent = 'اليوزر نيم: حروف وأرقام فقط (3 أحرف فأكثر)';
                errorMsg.style.display = 'block';
                return;
            }
            if (!displayName) {
                errorMsg.textContent = 'الرجاء إدخال الاسم الظاهر';
                errorMsg.style.display = 'block';
                return;
            }
            startChat(username, displayName);
        };
        
        useSavedBtn.onclick = function() {
            const saved = loadSavedUser();
            if (saved) startChat(saved.username, saved.displayName);
        };
        
        logoutSavedBtn.onclick = function() {
            logoutUser();
        };
        
        sendBtn.onclick = function() {
            const msg = messageInput.value.trim();
            if (msg && currentUser) {
                if (mutedUsers.includes(currentUser.username)) {
                    addSystemMessage('🔇 لا يمكنك إرسال رسالة لأنك مكتوم!');
                    return;
                }
                socket.emit('send-message', { 
                    message: msg,
                    username: currentUser.username,
                    displayName: currentUser.displayName,
                    isAdmin: currentUser.username === ADMIN_USERNAME
                });
                messageInput.value = '';
                messageInput.focus();
            }
        };
        
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendBtn.click();
        };
        
        loginUsername.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        loginDisplayname.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        // Socket events
        socket.on('receive-message', function(data) {
            addChatMessage(data);
        });
        
        socket.on('user-joined', function(data) {
            addSystemMessage(`✨ ${data.displayName} (@${data.username}) دخل الدردشة`);
        });
        
        socket.on('user-left', function(data) {
            addSystemMessage(`👋 ${data.displayName} (@${data.username}) غادر`);
        });
        
        socket.on('users-list', function(users) {
            usersCountSpan.innerText = users.length;
            updateMembersList(users);
        });
        
        socket.on('kicked', function(data) {
            if (currentUser && currentUser.username === data.username) {
                addSystemMessage(`⚠️ لقد تم طردك من الدردشة بواسطة المشرف`);
                setTimeout(() => location.reload(), 2000);
            }
        });
        
        socket.on('banned', function(data) {
            if (currentUser && currentUser.username === data.username) {
                addSystemMessage(`🚫 لقد تم حظرك من الدردشة`);
                bannedUsers.push(currentUser.username);
                localStorage.setItem('banned_users', JSON.stringify(bannedUsers));
                setTimeout(() => location.reload(), 2000);
            }
        });
        
        socket.on('mute-update', function(data) {
            if (data.muted) {
                if (!mutedUsers.includes(data.username)) mutedUsers.push(data.username);
            } else {
                mutedUsers = mutedUsers.filter(u => u !== data.username);
            }
            if (currentUser && currentUser.username === data.username && data.muted) {
                addSystemMessage(`🔇 لقد تم كتمك من قبل المشرف`);
            }
        });
        
        socket.on('username-taken', function() {
            errorMsg.textContent = 'هذا اليوزر نيم مستخدم من قبل!';
            errorMsg.style.display = 'block';
        });
        
        loadSavedUser();
    </script>
</body>
