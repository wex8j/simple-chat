<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة بغداد لايف</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a0033, #0a001a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(30, 0, 60, 0.8);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 35px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(156,39,176,0.5);
            box-shadow: 0 0 20px rgba(156,39,176,0.3);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(50,0,80,0.6);
            border: 1px solid #9c27b0;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, #CE1126, #9c27b0);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
        }
        .error { background: rgba(255,0,0,0.2); color: #ff6b6b; }
        .success { background: rgba(0,255,0,0.1); color: #4caf50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇮🇶 دردشة بغداد لايف</h1>
        <p>سجل دخولك</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="displayname" placeholder="الاسم الظاهر (للتسجيل)">
        <button id="loginBtn">دخول / تسجيل</button>
        <div id="message"></div>
    </div>

    <script>
        // تخزين المستخدمين في LocalStorage
        let users = JSON.parse(localStorage.getItem('baghdad_users') || '{}');
        
        function showMessage(text, isError = true) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                msgDiv.textContent = '';
                msgDiv.className = '';
            }, 3000);
        }
        
        document.getElementById('loginBtn').onclick = () => {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const displayName = document.getElementById('displayname').value.trim();
            
            if (!username || !password) {
                showMessage('❌ املأ جميع الحقول');
                return;
            }
            
            if (!users[username]) {
                // تسجيل جديد
                users[username] = {
                    password: password,
                    displayName: displayName || username,
                    isAdmin: username === '3tx'
                };
                localStorage.setItem('baghdad_users', JSON.stringify(users));
                showMessage(`✅ تم تسجيل حساب جديد! مرحباً ${users[username].displayName}`, false);
                // تفريغ الحقول
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('displayname').value = '';
            } else if (users[username].password === password) {
                // دخول
                showMessage(`✅ مرحباً ${users[username].displayName}${users[username].isAdmin ? ' (المشرف)' : ''}`, false);
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            } else {
                showMessage('❌ كلمة السر غير صحيحة');
            }
        };
    </script>
</body>
    </html>
