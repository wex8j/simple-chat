<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>دردشة بغداد لايف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://i.ibb.co/ymNqjks9/ec86b3a3baac247dab33322fcbc60384.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        /* الحاوية الرئيسية - شات + قائمة الأعضاء */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        /* الدردشة */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* قائمة الأعضاء */
        .members-sidebar {
            width: 220px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .members-header {
            padding: 16px 12px;
            background: rgba(206, 17, 38, 0.8);
            text-align: center;
        }

        .members-header h4 {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .members-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            margin-top: 4px;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .member-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .member-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .member-display {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .member-username {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .member-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 8px;
        }

        .member-status.offline {
            background: #666;
        }

        .admin-badge {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 20px;
            color: white;
            margin-top: 3px;
            display: inline-block;
        }

        .member-actions {
            display: flex;
            gap: 6px;
        }

        .admin-btn {
            background: rgba(206, 17, 38, 0.7);
            border: none;
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .admin-btn:hover {
            background: rgba(206, 17, 38, 1);
        }

        .admin-btn.kick {
            background: rgba(255, 100, 100, 0.6);
        }

        .admin-btn.ban {
            background: rgba(100, 100, 100, 0.6);
        }

        /* باقي الدردشة */
        .chat-header {
            background: linear-gradient(135deg, rgba(206,17,38,0.9) 0%, rgba(0,122,61,0.9) 100%);
            backdrop-filter: blur(10px);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo-flag {
            font-size: 28px;
            animation: wave 2s ease infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .logo-text h3 {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 10px;
        }

        .online-users {
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 10px;
            color: white;
            margin-top: 8px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .message {
            animation: fadeInUp 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 85%;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message .display-name {
            font-size: 12px;
            font-weight: 600;
            color: #ffaaaa;
            margin-bottom: 3px;
        }

        .message .username {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2px;
        }

        .message-bubble {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 18px;
            border-bottom-right-radius: 4px;
            max-width: 100%;
            word-wrap: break-word;
            word-break: break-word;
            color: white;
            font-size: 15px;
            line-height: 1.4;
        }

        .message .time {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        .system-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 11px;
            margin: 6px 0;
            background: rgba(0, 0, 0, 0.5);
            align-self: center;
            padding: 4px 12px;
            border-radius: 50px;
        }

        .input-area {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            autocomplete: off;
            spellcheck: false;
            autocorrect: off;
        }

        .input-area input:focus {
            background: rgba(255, 255, 255, 0.22);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-area button {
            padding: 12px 22px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .input-area button:active {
            transform: scale(0.96);
        }

        /* شاشة تسجيل الدخول */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .welcome-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 35px 25px;
            text-align: center;
            max-width: 330px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .welcome-card h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome-card h1 span {
            background: linear-gradient(135deg, #CE1126, #007A3D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
            font-size: 13px;
        }

        .welcome-card input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            text-align: center;
            outline: none;
            margin-bottom: 12px;
        }

        .welcome-card input:focus {
            border-color: #CE1126;
        }

        .welcome-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #CE1126, #007A3D);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .flag-decoration {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .saved-info {
            margin-top: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .saved-info button {
            background: transparent;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 11px;
            margin-top: 8px;
            display: none;
        }

        @media (max-width: 600px) {
            .members-sidebar {
                width: 150px;
            }
            .member-display {
                font-size: 11px;
            }
            .admin-btn {
                font-size: 9px;
                padding: 3px 6px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- الدردشة -->
        <div class="chat-container" id="chat-container" style="display: none;">
            <div class="chat-header">
                <div class="logo-area">
                    <div class="logo-flag">🇮🇶</div>
                    <div class="logo-text">
                        <h3>دردشة بغداد لايف</h3>
                        <p>Baghdad Live Chat</p>
                    </div>
                    <div class="logo-flag">🇮🇶</div>
                </div>
                <div class="online-users">🟢 <span id="users-count">0</span> متصل</div>
            </div>
            <div class="chat-messages" id="messages">
                <div class="system-message">✨ مرحباً بك في دردشة بغداد لايف</div>
            </div>
            <div class="input-area">
                <input type="text" id="message" placeholder="اكتب رسالة..." maxlength="500" autocomplete="off" spellcheck="false" autocorrect="off">
                <button id="send-btn">إرسال</button>
            </div>
        </div>

        <!-- قائمة الأعضاء -->
        <div class="members-sidebar" id="members-sidebar" style="display: none;">
            <div class="members-header">
                <h4>👥 الأعضاء النشطين</h4>
                <p id="members-count">0 متصل</p>
            </div>
            <div class="members-list" id="members-list">
                <div class="system-message" style="background: none;">جاري التحميل...</div>
            </div>
        </div>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-card">
            <div class="flag-decoration">🇮🇶</div>
            <h1>دردشة <span>بغداد لايف</span></h1>
            <p>سجل دخولك وابدأ المحادثة</p>
            
            <input type="text" id="login-username" placeholder="يوزر نيم" maxlength="20" dir="ltr">
            <input type="text" id="login-displayname" placeholder="الاسم الظاهر" maxlength="20">
            
            <button id="login-btn">دخول</button>
            
            <div class="error-msg" id="error-msg"></div>
            
            <div class="saved-info" id="saved-info" style="display: none;">
                <div id="saved-text"></div>
                <button id="use-saved-btn">استخدم الحساب المحفوظ</button>
                <button id="logout-saved-btn" style="background: rgba(206,17,38,0.5);">تسجيل خروج</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let bannedUsers = JSON.parse(localStorage.getItem('banned_users') || '[]');
        
        // المشرف
        const ADMIN_USERNAME = "3tx";  // <--- هذا اليوزر نيم حق المشرف
        
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatContainer = document.getElementById('chat-container');
        const membersSidebar = document.getElementById('members-sidebar');
        const membersList = document.getElementById('members-list');
        const membersCountSpan = document.getElementById('members-count');
        const loginUsername = document.getElementById('login-username');
        const loginDisplayname = document.getElementById('login-displayname');
        const loginBtn = document.getElementById('login-btn');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');
        const usersCountSpan = document.getElementById('users-count');
        const errorMsg = document.getElementById('error-msg');
        const savedInfo = document.getElementById('saved-info');
        const savedText = document.getElementById('saved-text');
        const useSavedBtn = document.getElementById('use-saved-btn');
        const logoutSavedBtn = document.getElementById('logout-saved-btn');
        
        function saveUser(username, displayName) {
            localStorage.setItem('chat_user', JSON.stringify({ username, displayName }));
        }
        
        function logoutUser() {
            localStorage.removeItem('chat_user');
            savedInfo.style.display = 'none';
            loginUsername.value = '';
            loginDisplayname.value = '';
        }
        
        function loadSavedUser() {
            const saved = localStorage.getItem('chat_user');
            if (saved) {
                try {
                    const user = JSON.parse(saved);
                    if (user.username && user.displayName) {
                        savedText.innerHTML = `👤 مرحباً ${user.displayName} (${user.username})`;
                        savedInfo.style.display = 'block';
                        return user;
                    }
                } catch(e) {}
            }
            return null;
        }
        
        function updateMembersList(users) {
            if (!membersList) return;
            
            membersList.innerHTML = '';
            if (users.length === 0) {
                membersList.innerHTML = '<div class="system-message" style="background: none;">لا يوجد أعضاء</div>';
                membersCountSpan.innerText = '0 متصل';
                return;
            }
            
            membersCountSpan.innerText = users.length + ' متصل';
            
            users.forEach(user => {
                const isAdmin = (user.username === ADMIN_USERNAME);
                const isCurrentUser = (currentUser && user.username === currentUser.username);
                const canModerate = currentUser && currentUser.username === ADMIN_USERNAME && !isCurrentUser;
                
                const memberDiv = document.createElement('div');
                memberDiv.className = 'member-item';
                memberDiv.innerHTML = `
                    <div class="member-info">
                        <div class="member-display">
                            <span class="member-status"></span>
                            ${escapeHtml(user.displayName)}
                            ${isAdmin ? '<span class="admin-badge">👑 مشرف</span>' : ''}
                        </div>
                        <div class="member-username">@${escapeHtml(user.username)}</div>
                    </div>
                    ${canModerate ? `
                        <div class="member-actions">
                            <button class="admin-btn kick" data-username="${user.username}" data-display="${user.displayName}">طرد</button>
                            <button class="admin-btn ban" data-username="${user.username}" data-display="${user.displayName}">حظر</button>
                        </div>
                    ` : ''}
                `;
                membersList.appendChild(memberDiv);
            });
            
            // إضافة أحداث الأزرار
            document.querySelectorAll('.admin-btn.kick').forEach(btn => {
                btn.onclick = () => kickUser(btn.dataset.username, btn.dataset.display);
            });
            document.querySelectorAll('.admin-btn.ban').forEach(btn => {
                btn.onclick = () => banUser(btn.dataset.username, btn.dataset.display);
            });
        }
        
        function kickUser(username, displayName) {
            if (currentUser && currentUser.username === ADMIN_USERNAME) {
                socket.emit('kick-user', { username, displayName });
                addSystemMessage(`⚠️ ${displayName} (@${username}) تم طرده من الدردشة بواسطة المشرف`);
            }
        }
        
        function banUser(username, displayName) {
            if (currentUser && currentUser.username === ADMIN_USERNAME) {
                if (!bannedUsers.includes(username)) {
                    bannedUsers.push(username);
                    localStorage.setItem('banned_users', JSON.stringify(bannedUsers));
                    socket.emit('ban-user', { username, displayName });
                    addSystemMessage(`🚫 ${displayName} (@${username}) تم حظره من الدردشة بواسطة المشرف`);
                }
            }
        }
        
        function startChat(username, displayName) {
            // التحقق من الحظر
            if (bannedUsers.includes(username)) {
                errorMsg.textContent = '⛔ حسابك محظور من الدردشة!';
                errorMsg.style.display = 'block';
                return;
            }
            
            currentUser = { username, displayName };
            saveUser(username, displayName);
            socket.emit('set-user', { username, displayName, isAdmin: username === ADMIN_USERNAME });
            welcomeScreen.style.display = 'none';
            chatContainer.style.display = 'flex';
            membersSidebar.style.display = 'flex';
            addSystemMessage('✨ أهلاً بك ' + displayName + (username === ADMIN_USERNAME ? ' (المشرف)' : ''));
            messageInput.focus();
        }
        
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addChatMessage(data) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="display-name">${escapeHtml(data.displayName)}${data.isAdmin ? ' 👑' : ''}</div>
                <div class="username">@${escapeHtml(data.username)}</div>
                <div class="message-bubble">${escapeHtml(data.message)}</div>
                <div class="time">${data.time}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function isValidUsername(username) {
            return username.length >= 3 && /^[a-zA-Z0-9_]+$/.test(username);
        }
        
        loginBtn.onclick = function() {
            const username = loginUsername.value.trim().toLowerCase();
            const displayName = loginDisplayname.value.trim();
            errorMsg.style.display = 'none';
            
            if (username === '') {
                errorMsg.textContent = 'الرجاء إدخال يوزر نيم';
                errorMsg.style.display = 'block';
                return;
            }
            if (!isValidUsername(username)) {
                errorMsg.textContent = 'اليوزر نيم: حروف وأرقام فقط (3 أحرف فأكثر)';
                errorMsg.style.display = 'block';
                return;
            }
            if (displayName === '') {
                errorMsg.textContent = 'الرجاء إدخال الاسم الظاهر';
                errorMsg.style.display = 'block';
                return;
            }
            startChat(username, displayName);
        };
        
        useSavedBtn.onclick = function() {
            const saved = loadSavedUser();
            if (saved) startChat(saved.username, saved.displayName);
        };
        
        logoutSavedBtn.onclick = function() {
            logoutUser();
        };
        
        sendBtn.onclick = function() {
            const msg = messageInput.value.trim();
            if (msg !== '' && currentUser) {
                socket.emit('send-message', { 
                    message: msg,
                    username: currentUser.username,
                    displayName: currentUser.displayName,
                    isAdmin: currentUser.username === ADMIN_USERNAME
                });
                messageInput.value = '';
                messageInput.focus();
            }
        };
        
        messageInput.onkeypress = function(e) {
            if (e.key === 'Enter') sendBtn.click();
        };
        
        loginUsername.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        loginDisplayname.onkeypress = function(e) {
            if (e.key === 'Enter') loginBtn.click();
        };
        
        // استقبال الأحداث من السيرفر
        socket.on('receive-message', function(data) {
            addChatMessage(data);
        });
        
        socket.on('user-joined', function(data) {
            addSystemMessage(`✨ ${data.displayName} (@${data.username}) دخل الدردشة`);
        });
        
        socket.on('user-left', function(data) {
            addSystemMessage(`👋 ${data.displayName} (@${data.username}) غادر`);
        });
        
        socket.on('users-list', function(users) {
            usersCountSpan.innerText = users.length;
            updateMembersList(users);
        });
        
        socket.on('kicked', function(data) {
            if (currentUser && currentUser.username === data.username) {
                addSystemMessage(`⚠️ لقد تم طردك من الدردشة بواسطة المشرف`);
                setTimeout(() => {
                    location.reload();
                }, 2000);
            }
        });
        
        socket.on('banned', function(data) {
            if (currentUser && currentUser.username === data.username) {
                addSystemMessage(`🚫 لقد تم حظرك من الدردشة`);
                bannedUsers.push(currentUser.username);
                localStorage.setItem('banned_users', JSON.stringify(bannedUsers));
                setTimeout(() => {
                    location.reload();
                }, 2000);
            }
        });
        
        socket.on('username-taken', function() {
            errorMsg.textContent = 'هذا اليوزر نيم مستخدم من قبل!';
            errorMsg.style.display = 'block';
        });
        
        loadSavedUser();
    </script>
</body>
    </html>
