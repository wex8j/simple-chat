<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بغداد لايف</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #121212;
            color: #fff;
        }

        /* شاشة الدخول */
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: #1e1e2e;
            padding: 35px;
            border-radius: 30px;
            width: 340px;
            text-align: center;
        }
        .login-card h1 { font-size: 28px; margin-bottom: 5px; color: #CE1126; }
        .login-card input {
            width: 100%; padding: 12px; margin: 8px 0; background: #2a2a3a;
            border: none; border-radius: 40px; color: white; text-align: center;
        }
        .login-card button {
            width: 100%; padding: 12px; margin-top: 10px; background: #CE1126;
            border: none; border-radius: 40px; color: white; font-weight: bold; cursor: pointer;
        }
        .error { color: #ff6b6b; margin-top: 12px; }

        /* التطبيق */
        .app {
            display: flex;
            height: 100vh;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 260px;
            background: #0a0a0a;
            padding: 25px 20px;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            padding-bottom: 25px;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
            color: #CE1126;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 5px 0;
            border-radius: 30px;
            cursor: pointer;
            color: #aaa;
        }
        .nav-item.active, .nav-item:hover {
            background: #CE1126;
            color: white;
        }
        .user-info {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 45px; height: 45px;
            background: #CE1126;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logout-btn {
            background: none; border: none; font-size: 20px; cursor: pointer;
        }

        /* المحتوى الرئيسي */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* الصفحات الثلاث */
        .page {
            max-width: 600px;
            margin: 0 auto;
            display: none;
        }
        .page.active {
            display: block;
        }

        /* المنشورات */
        .new-post {
            background: #1e1e2e;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .new-post textarea {
            width: 100%;
            background: #2a2a3a;
            border: none;
            border-radius: 20px;
            padding: 12px;
            color: white;
            resize: none;
        }
        .post-btn {
            margin-top: 10px;
            background: #CE1126;
            border: none;
            padding: 8px 25px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .post-card {
            background: #1e1e2e;
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 15px;
        }
        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 45px; height: 45px;
            background: #CE1126;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .post-name {
            font-weight: bold;
        }
        .post-username {
            font-size: 11px;
            color: #888;
        }
        .post-time {
            font-size: 10px;
            color: #666;
        }
        .post-text {
            margin: 12px 0;
            line-height: 1.4;
        }
        .post-actions {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #333;
        }
        .like-btn, .delete-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
        }
        .like-btn:hover { color: #ff6b6b; }

        /* الدردشات والطلبات */
        .chat-item, .request-item {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .request-actions {
            display: flex;
            gap: 8px;
        }
        .accept, .reject {
            padding: 6px 14px;
            border-radius: 30px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .accept { background: #4caf50; }
        .reject { background: #f44336; }
        .empty {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        /* نافذة الدردشة */
        .chat-window {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
        }
        .chat-header {
            padding: 15px;
            background: #1e1e2e;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .msg {
            margin-bottom: 12px;
        }
        .msg.own {
            text-align: left;
        }
        .bubble {
            display: inline-block;
            background: #2a2a3a;
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 80%;
        }
        .msg.own .bubble {
            background: #CE1126;
        }
        .chat-input {
            padding: 15px;
            background: #1e1e2e;
            display: flex;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            background: #2a2a3a;
            border: none;
            border-radius: 30px;
            color: white;
        }
        .chat-input button {
            padding: 12px 24px;
            background: #CE1126;
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        /* قائمة المستخدمين */
        .users-panel {
            width: 260px;
            background: #0a0a0a;
            padding: 20px;
            border-right: 1px solid #222;
            overflow-y: auto;
        }
        .users-panel h3 { margin-bottom: 15px; }
        .user-item {
            background: #1e1e2e;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .add-friend {
            background: #CE1126;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .friend-badge {
            background: #4caf50;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
        }
        .request-badge {
            background: #ff9800;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
        }
    </style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-card">
        <h1>🇮🇶 بغداد لايف</h1>
        <p>سجل دخولك</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <input type="text" id="displayname" placeholder="الاسم الظاهر (للتسجيل)">
        <button id="login-btn">دخول / تسجيل</button>
        <div class="error" id="error-msg"></div>
    </div>
</div>

<div class="app" id="app" style="display: none;">
    <div class="sidebar">
        <div class="logo">🇮🇶 بغداد لايف</div>
        <div class="nav-item active" data-page="posts">📱 المنشورات</div>
        <div class="nav-item" data-page="chats">💬 الدردشات</div>
        <div class="nav-item" data-page="requests">📩 الطلبات</div>
        <div class="user-info">
            <div class="user-avatar">👤</div>
            <div><div id="user-name"></div><div id="user-username" style="font-size: 11px;"></div></div>
            <button class="logout-btn" id="logout-btn">🚪</button>
        </div>
    </div>

    <div class="main">
        <!-- صفحة المنشورات -->
        <div class="page active" id="posts-page">
            <div class="new-post">
                <textarea id="post-text" placeholder="شارك ما في خاطرك..." rows="3"></textarea>
                <button class="post-btn" id="post-btn">نشر</button>
            </div>
            <div id="posts-list"></div>
        </div>

        <!-- صفحة الدردشات -->
        <div class="page" id="chats-page">
            <div id="chats-list"></div>
        </div>

        <!-- صفحة الطلبات -->
        <div class="page" id="requests-page">
            <div id="requests-list"></div>
        </div>

        <!-- نافذة الدردشة الخاصة -->
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <button class="back" id="chat-back">←</button>
                <span id="chat-with-name"></span>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="اكتب رسالة...">
                <button id="send-msg">إرسال</button>
            </div>
        </div>
    </div>

    <div class="users-panel">
        <h3>👥 المستخدمون</h3>
        <div id="users-list"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket, currentUser, currentChatWith;
let conversations = JSON.parse(localStorage.getItem('conv') || '{}');

function escapeHtml(t) { let d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`${page}-page`).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
    if (page === 'chats') loadChatsList();
    if (page === 'requests') loadRequestsList();
}

function updateUsers(users) {
    let container = document.getElementById('users-list');
    container.innerHTML = '';
    users.forEach(u => {
        if (u.username === currentUser.username) return;
        let isFriend = currentUser.friends.includes(u.username);
        let hasRequest = currentUser.requests.includes(u.username);
        let div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
            <div>
                <div><strong>${escapeHtml(u.displayName)}</strong></div>
                <div style="font-size:11px;color:#888;">@${escapeHtml(u.username)}</div>
                ${isFriend ? '<span class="friend-badge">صديق</span>' : ''}
                ${hasRequest ? '<span class="request-badge">طلب</span>' : ''}
            </div>
            ${!isFriend && !hasRequest ? `<button class="add-friend" data-user="${u.username}">➕ إضافة</button>` : ''}
        `;
        let btn = div.querySelector('.add-friend');
        if (btn) btn.onclick = () => socket.emit('add-friend', u.username);
        container.appendChild(div);
    });
}

function loadRequestsList() {
    let container = document.getElementById('requests-list');
    if (!currentUser.requests.length) { container.innerHTML = '<div class="empty">لا توجد طلبات</div>'; return; }
    container.innerHTML = '';
    currentUser.requests.forEach(req => {
        let div = document.createElement('div');
        div.className = 'request-item';
        div.innerHTML = `
            <div><strong>${escapeHtml(req)}</strong> يريد إضافتك</div>
            <div class="request-actions">
                <button class="accept" data-user="${req}">قبول</button>
                <button class="reject" data-user="${req}">رفض</button>
            </div>
        `;
        div.querySelector('.accept').onclick = () => socket.emit('accept-friend', req);
        div.querySelector('.reject').onclick = () => socket.emit('reject-friend', req);
        container.appendChild(div);
    });
}

function loadChatsList() {
    let container = document.getElementById('chats-list');
    let friends = currentUser.friends;
    if (!friends.length) { container.innerHTML = '<div class="empty">لا توجد محادثات</div>'; return; }
    container.innerHTML = '';
    friends.forEach(f => {
        let room = [currentUser.username, f].sort().join('-');
        let last = conversations[room]?.length ? conversations[room][conversations[room].length-1].message : '';
        let div = document.createElement('div');
        div.className = 'chat-item';
        div.innerHTML = `<div><strong>${escapeHtml(f)}</strong><div style="font-size:12px;color:#888;">${last ? last.substring(0,30) : 'ابدأ المحادثة'}</div></div>`;
        div.onclick = () => openChat(f);
        container.appendChild(div);
    });
}

function openChat(username) {
    if (!currentUser.friends.includes(username)) return;
    currentChatWith = username;
    document.querySelector('.main').style.display = 'none';
    document.getElementById('chat-window').style.display = 'flex';
    document.getElementById('chat-with-name').textContent = username;
    let msgsDiv = document.getElementById('chat-messages');
    msgsDiv.innerHTML = '';
    let room = [currentUser.username, username].sort().join('-');
    let msgs = conversations[room] || [];
    msgs.forEach(m => addMessage(m.message, m.from === currentUser.username, m.time));
}

function addMessage(msg, isOwn, time) {
    let div = document.createElement('div');
    div.className = 'msg ' + (isOwn ? 'own' : '');
    div.innerHTML = `<div class="bubble">${escapeHtml(msg)}</div><div style="font-size:10px;color:#888;">${time||''}</div>`;
    document.getElementById('chat-messages').appendChild(div);
    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

function sendMessage() {
    let input = document.getElementById('chat-input');
    let msg = input.value.trim();
    if (!msg || !currentChatWith) return;
    socket.emit('private-message', { to: currentChatWith, message: msg });
    let room = [currentUser.username, currentChatWith].sort().join('-');
    if (!conversations[room]) conversations[room] = [];
    conversations[room].push({ from: currentUser.username, message: msg, time: new Date().toLocaleTimeString() });
    localStorage.setItem('conv', JSON.stringify(conversations));
    addMessage(msg, true, new Date().toLocaleTimeString());
    input.value = '';
}

function addPost(post) {
    let container = document.getElementById('posts-list');
    let isOwn = post.username === currentUser.username;
    let div = document.createElement('div');
    div.className = 'post-card';
    div.dataset.id = post.id;
    div.innerHTML = `
        <div class="post-header">
            <div class="post-avatar">👤</div>
            <div>
                <div class="post-name">${escapeHtml(post.displayName)}</div>
                <div class="post-username">@${escapeHtml(post.username)}</div>
            </div>
            <div class="post-time">${new Date(post.time).toLocaleTimeString()}</div>
        </div>
        <div class="post-text">${escapeHtml(post.text)}</div>
        <div class="post-actions">
            <button class="like-btn">❤️ ${post.likes||0}</button>
            ${isOwn ? '<button class="delete-btn">🗑️ حذف</button>' : ''}
        </div>
    `;
    div.querySelector('.like-btn').onclick = () => socket.emit('like-post', post.id);
    if (isOwn) div.querySelector('.delete-btn').onclick = () => socket.emit('delete-post', post.id);
    container.prepend(div);
}

function loadPosts(posts) {
    let container = document.getElementById('posts-list');
    container.innerHTML = '';
    [...posts].reverse().forEach(p => addPost(p));
}

function startApp(data) {
    currentUser = {
        username: data.username,
        displayName: data.displayName,
        friends: data.friends || [],
        requests: data.requests || []
    };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-name').textContent = data.displayName;
    document.getElementById('user-username').textContent = `@${data.username}`;
    updateUsers(data.users);
    loadPosts(data.posts);
    switchPage('posts');
    
    socket.on('new-request', (d) => {
        currentUser.requests.push(d.from);
        updateUsers(data.users);
        if (document.getElementById('requests-page').classList.contains('active')) loadRequestsList();
    });
    socket.on('request-accepted', (d) => {
        if (!currentUser.friends.includes(d.from)) currentUser.friends.push(d.from);
        currentUser.requests = currentUser.requests.filter(u => u !== d.from);
        updateUsers(data.users);
        loadChatsList();
        loadRequestsList();
    });
    socket.on('new-message', (d) => {
        let room = [currentUser.username, d.from].sort().join('-');
        if (!conversations[room]) conversations[room] = [];
        conversations[room].push({ from: d.from, message: d.message, time: d.time });
        localStorage.setItem('conv', JSON.stringify(conversations));
        if (currentChatWith === d.from) addMessage(d.message, false, d.time);
        else loadChatsList();
    });
    socket.on('post-added', (p) => addPost(p));
    socket.on('post-updated', (p) => {
        let el = document.querySelector(`.post-card[data-id="${p.id}"]`);
        if (el) el.querySelector('.like-btn').innerHTML = `❤️ ${p.likes}`;
    });
    socket.on('post-deleted', (id) => document.querySelector(`.post-card[data-id="${id}"]`)?.remove());
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('login-btn').onclick = () => {
        let user = document.getElementById('username').value.trim().toLowerCase();
        let pass = document.getElementById('password').value.trim();
        let name = document.getElementById('displayname').value.trim();
        let err = document.getElementById('error-msg');
        if (!user || !pass) { err.textContent = 'املأ الحقول'; return; }
        socket = io();
        socket.on('connect', () => socket.emit('login', { username: user, password: pass, displayName: name || user }));
        socket.on('login-success', startApp);
        socket.on('login-error', (m) => err.textContent = m);
    };
    document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('conv'); location.reload(); };
    document.getElementById('post-btn').onclick = () => {
        let t = document.getElementById('post-text').value.trim();
        if (t && socket) socket.emit('new-post', { text: t });
        document.getElementById('post-text').value = '';
    };
    document.getElementById('chat-back').onclick = () => {
        document.getElementById('chat-window').style.display = 'none';
        document.querySelector('.main').style.display = 'block';
        currentChatWith = null;
        switchPage('chats');
    };
    document.getElementById('send-msg').onclick = sendMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    document.querySelectorAll('.nav-item').forEach(el => el.onclick = () => switchPage(el.dataset.page));
});
</script>
</body>
</html>
